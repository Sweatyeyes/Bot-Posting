<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <button onclick="sendData()">📤 ОТПРАВИТЬ</button>
    <div id="log"></div>
    <script>
        const TUNNEL_URL = 'https://wvvnw-176-116-166-148.a.free.pinggy.link';
        
        async function sendData() {
            const tg = window.Telegram.WebApp;
            tg.ready();
            
            const log = document.getElementById('log');
            log.innerHTML = '📤 Отправка...';
            
            try {
                const response = await fetch(`${TUNNEL_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Pinggy-No-Screen': 'true',
                        'User-Agent': 'Pinggy-API-Client/1.0'
                    },
                    body: JSON.stringify({
                        user_id: tg.initDataUnsafe?.user?.id,
                        start_param: tg.initDataUnsafe?.start_param,
                        timestamp: Date.now()
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    log.innerHTML = '✅ Успех: ' + JSON.stringify(data);
                } else {
                    log.innerHTML = '❌ Ошибка ' + response.status;
                }
            } catch (e) {
                log.innerHTML = '❌ Сеть: ' + e.message;
            }
        }
    </script>
</body>
</html>
