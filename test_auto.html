<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔍 АВТОМАТИЧЕСКАЯ ОТПРАВКА</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: #2d2d2d; border-radius: 15px; padding: 20px; }
        h1 { color: #ffd700; text-align: center; font-size: 20px; }
        .status { color: #00ff00; font-weight: bold; }
        .log { background: #000; color: #0f0; padding: 10px; border-radius: 5px; font-size: 12px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 АВТОМАТИЧЕСКАЯ ОТПРАВКА</h1>
        <div>📡 Статус: <span id="status" class="status">Инициализация...</span></div>
        <div>👤 User ID: <span id="user-id">-</span></div>
        <div>🎯 Пост: <span id="start-param">-</span></div>
        <div class="log" id="debug-log"></div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        const LT_URL = 'https://chubby-bobcats-dress.loca.lt';  // текущий URL localtunnel
        const LT_PASSWORD = '176.116.166.148';  // пароль для заголовка (проверь curl https://loca.lt/mytunnelpassword)
        
        // ==================== ЛОГИРОВАНИЕ ====================
        const debugLog = document.getElementById('debug-log');
        const statusEl = document.getElementById('status');
        const userIdEl = document.getElementById('user-id');
        const startParamEl = document.getElementById('start-param');
        
        function log(msg) {
            const timestamp = new Date().toLocaleTimeString();
            const logLine = `[${timestamp}] ${msg}`;
            debugLog.innerHTML += `<div>${logLine}</div>`;
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(logLine);
        }

        // ==================== ПОЛУЧЕНИЕ ДАННЫХ ====================
        function getTelegramData() {
            const tg = window.Telegram?.WebApp;
            if (!tg) {
                log('❌ Telegram WebApp не доступен');
                return null;
            }
            
            tg.ready();
            
            return {
                user: tg.initDataUnsafe?.user,
                start_param: tg.initDataUnsafe?.start_param || 'не передан'
            };
        }

        // ==================== ФОРМИРОВАНИЕ ДАННЫХ ====================
        function prepareData() {
            const tgData = getTelegramData();
            
            return {
                type: 'auto_data',
                timestamp: Date.now(),
                user: tgData?.user ? {
                    id: tgData.user.id,
                    first_name: tgData.user.first_name,
                    username: tgData.user.username
                } : null,
                start_param: tgData?.start_param
            };
        }

        // ==================== ОТПРАВКА ЧЕРЕЗ LOCAL TUNNEL ====================
        async function autoSend() {
            const dataToSend = prepareData();
            
            log(`📤 Отправка на ${LT_URL}/api/webapp-data...`);
            log(`🔑 Использую пароль: ${LT_PASSWORD}`);
            statusEl.textContent = '📤 Отправка...';

            try {
                const response = await fetch(`${LT_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': LT_PASSWORD  // ВАЖНО: используем пароль!
                    },
                    body: JSON.stringify(dataToSend)
                });

                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Успех: ${JSON.stringify(result)}`);
                    statusEl.textContent = '✅ Отправлено!';
                } else {
                    const errorText = await response.text();
                    log(`❌ Ошибка HTTP ${response.status}: ${errorText.substring(0, 100)}`);
                    statusEl.textContent = '❌ Ошибка';
                }
            } catch (e) {
                log(`❌ Ошибка сети: ${e.message}`);
                statusEl.textContent = '❌ Ошибка';
            }
        }

        // ==================== ПРОВЕРКА СОЕДИНЕНИЯ ====================
        async function testConnection() {
            try {
                log('🔄 Проверка соединения с localtunnel...');
                const response = await fetch(`${LT_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': LT_PASSWORD
                    },
                    body: JSON.stringify({test: 'ping', timestamp: Date.now()})
                });
                if (response.ok) {
                    log('✅ Соединение работает');
                } else {
                    log(`❌ Ошибка соединения: ${response.status}`);
                }
            } catch (e) {
                log(`❌ Не удалось подключиться: ${e.message}`);
            }
        }

        // ==================== ЗАПУСК ====================
        window.addEventListener('load', () => {
            log('🚀 Страница загружена');
            log(`🌐 localtunnel URL: ${LT_URL}`);
            
            // Показываем данные пользователя если есть
            const tgData = getTelegramData();
            if (tgData?.user) {
                userIdEl.textContent = tgData.user.id;
                startParamEl.textContent = tgData.start_param;
                log(`👤 User ID: ${tgData.user.id}`);
                log(`🎯 Start param: ${tgData.start_param}`);
            }
            
            // Проверяем соединение
            testConnection();
            
            // Автоматическая отправка через 2 секунды
            setTimeout(autoSend, 2000);
        });

    </script>
</body>
</html>
