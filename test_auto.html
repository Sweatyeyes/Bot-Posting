<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔍 АВТОМАТИЧЕСКАЯ ОТПРАВКА</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; background: #2d2d2d; border-radius: 15px; padding: 20px; }
        h1 { color: #ffd700; text-align: center; font-size: 20px; }
        .status { color: #00ff00; font-weight: bold; }
        .log { background: #000; color: #0f0; padding: 10px; border-radius: 5px; font-size: 12px; margin-top: 20px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 АВТОМАТИЧЕСКАЯ ОТПРАВКА</h1>
        <div>📡 Статус: <span id="status" class="status">Инициализация...</span></div>
        <div>👤 User ID: <span id="user-id">-</span></div>
        <div>🎯 Пост: <span id="start-param">-</span></div>
        <div class="log" id="debug-log"></div>
    </div>

    <script>
        const LT_URL = 'https://light-walls-jump.loca.lt';
        
        function log(msg) {
            const el = document.getElementById('debug-log');
            el.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
            console.log(msg);
        }

        async function autoSend() {
            const tg = window.Telegram?.WebApp;
            if (!tg) { log('❌ Нет Telegram WebApp'); return; }
            
            tg.ready();
            
            const user = tg.initDataUnsafe?.user;
            const startParam = tg.initDataUnsafe?.start_param || 'не передан';
            
            document.getElementById('user-id').textContent = user?.id || '-';
            document.getElementById('start-param').textContent = startParam;
            
            const data = {
                type: 'auto_data',
                timestamp: Date.now(),
                user: user ? {
                    id: user.id,
                    first_name: user.first_name,
                    username: user.username
                } : null,
                start_param: startParam
            };
            
            log('📤 Отправка данных...');
            document.getElementById('status').textContent = '📤 Отправка...';
            
            try {
                const response = await fetch(`${LT_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': 'true'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    log('✅ Данные отправлены!');
                    document.getElementById('status').textContent = '✅ Отправлено!';
                } else {
                    log('❌ Ошибка HTTP');
                    document.getElementById('status').textContent = '❌ Ошибка';
                }
            } catch (e) {
                log(`❌ Ошибка: ${e.message}`);
                document.getElementById('status').textContent = '❌ Ошибка';
            }
        }

        window.addEventListener('load', () => {
            log('🚀 Страница загружена');
            setTimeout(autoSend, 1000);
        });
    </script>
</body>
</html>
