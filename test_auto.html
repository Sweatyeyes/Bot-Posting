<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PINGGY TEST</title>
    <script src="https://telegram.org"></script>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .log { background: #000; color: #0f0; padding: 10px; border-radius: 5px; font-size: 11px; text-align: left; margin-top: 20px; overflow-y: auto; height: 150px; }
        .status { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>
    <h3>🛰️ PINGGY BYPASS</h3>
    <div id="st" class="status">Ожидание...</div>
    <div class="log" id="log"></div>

    <script>
        // !!! ОБЯЗАТЕЛЬНО ПРОВЕРЬТЕ ЭТОТ URL !!!
        const TUNNEL_URL = 'https://wvvnw-176-116-166-148.a.free.pinggy.link';
        const logEl = document.getElementById('log');

        function addLog(m) { logEl.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${m}</div>`; logEl.scrollTop = logEl.scrollHeight; }

        async function sendData() {
            const tg = window.Telegram.WebApp;
            tg.ready();

            const payload = {
                user: tg.initDataUnsafe?.user || 'no_user',
                start_param: tg.initDataUnsafe?.start_param || 'no_param',
                pinggy_mode: 'simple_request'
            };

            addLog("📤 Пробую отправить (Simple Request)...");
            
            try {
                const res = await fetch(`${TUNNEL_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' }, // ОБХОД OPTIONS
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    const json = await res.json();
                    addLog("✅ ПРИНЯТО: " + JSON.stringify(json));
                    document.getElementById('st').innerText = "✅ УСПЕХ!";
                } else {
                    addLog("❌ ОШИБКА: " + res.status);
                }
            } catch (e) {
                addLog("❌ СЕТЬ: " + e.message);
            }
        }

        window.onload = () => {
            addLog("🚀 Запуск...");
            setTimeout(sendData, 1500);
        };
    </script>
</body>
</html>
