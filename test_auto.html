<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔍 ТЕСТ ПОЛУЧЕНИЯ ДАННЫХ ПОЛЬЗОВАТЕЛЯ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 15px;
            margin: 0;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: #2d2d2d;
            border-radius: 15px;
            padding: 20px;
        }
        h1 {
            color: #ffd700;
            text-align: center;
        }
        .data-box {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #2ea6ff;
        }
        .status {
            color: #00ff00;
            font-weight: bold;
        }
        .debug {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
        }
        .button {
            background: #2ea6ff;
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
        }
        .button:hover {
            background: #1a8cff;
        }
        .tunnel-info {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 14px;
            margin: 10px 0;
            border: 1px solid #2ea6ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 АВТОМАТИЧЕСКАЯ ОТПРАВКА ДАННЫХ</h1>
        
        <div class="tunnel-info">
            📡 localtunnel: <b>https://fresh-hornets-push.loca.lt</b>
        </div>
        
        <div class="data-box">
            <div>📦 Статус: <span id="status" class="status">Инициализация...</span></div>
            <div>👤 User ID: <span id="user-id">загрузка...</span></div>
            <div>🎯 Start Param: <span id="start-param">загрузка...</span></div>
        </div>

        <button class="button" onclick="sendViaHTTP()">📤 ОТПРАВИТЬ ЧЕРЕЗ HTTP</button>
        <button class="button" onclick="sendViaTelegram()">🤖 ОТПРАВИТЬ ЧЕРЕЗ TELEGRAM</button>

        <div class="debug" id="debug-log"></div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        const LT_URL = 'https://fresh-hornets-push.loca.lt';  // ваш localtunnel URL
        const BOT_USERNAME = 't3st_back_bot';
        
        // ==================== ЛОГИРОВАНИЕ ====================
        const debugLog = document.getElementById('debug-log');
        const statusEl = document.getElementById('status');
        const userIdEl = document.getElementById('user-id');
        const startParamEl = document.getElementById('start-param');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logLine = `[${timestamp}] ${message}`;
            debugLog.innerHTML += `<div>${logLine}</div>`;
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(logLine);
        }

        // ==================== ПОЛУЧЕНИЕ ДАННЫХ ИЗ TELEGRAM ====================
        function getTelegramData() {
            const tg = window.Telegram?.WebApp;
            if (!tg) return null;
            
            tg.ready();
            
            return {
                user: tg.initDataUnsafe?.user,
                start_param: tg.initDataUnsafe?.start_param || 'не передан',
                chat_instance: tg.initDataUnsafe?.chat_instance,
                chat_type: tg.initDataUnsafe?.chat_type
            };
        }

        // ==================== ФОРМИРОВАНИЕ ДАННЫХ ====================
        function prepareData() {
            const tgData = getTelegramData();
            
            return {
                type: 'auto_webapp_data',
                source: 'test_html_auto',
                timestamp: Date.now(),
                user: tgData?.user ? {
                    id: tgData.user.id,
                    first_name: tgData.user.first_name,
                    last_name: tgData.user.last_name,
                    username: tgData.user.username,
                    language_code: tgData.user.language_code
                } : null,
                start_param: tgData?.start_param,
                chat_instance: tgData?.chat_instance,
                chat_type: tgData?.chat_type,
                page_url: window.location.href,
                user_agent: navigator.userAgent
            };
        }

        // ==================== ОТПРАВКА ЧЕРЕЗ HTTP (localtunnel) ====================
        async function sendViaHTTP() {
            try {
                const dataToSend = prepareData();
                
                log(`📤 Отправка через HTTP на ${LT_URL}/api/webapp-data...`);
                log(`📦 Данные: ${JSON.stringify(dataToSend)}`);
                statusEl.textContent = '📤 Отправка...';

                const response = await fetch(`${LT_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(dataToSend)
                });

                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Успех: ${JSON.stringify(result)}`);
                    statusEl.textContent = '✅ Отправлено через HTTP!';
                } else {
                    const error = await response.text();
                    log(`❌ Ошибка HTTP ${response.status}: ${error}`);
                    statusEl.textContent = '❌ Ошибка HTTP';
                }
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`);
                statusEl.textContent = '❌ Ошибка отправки';
            }
        }

        // ==================== ОТПРАВКА ЧЕРЕЗ TELEGRAM (tg.sendData) ====================
        function sendViaTelegram() {
            try {
                const tg = window.Telegram?.WebApp;
                if (!tg) {
                    log('❌ Telegram WebApp не доступен');
                    return;
                }

                const dataToSend = prepareData();
                
                log(`📤 Отправка через Telegram API...`);
                statusEl.textContent = '📤 Отправка...';

                tg.sendData(JSON.stringify(dataToSend));
                
                log('✅ Данные отправлены через Telegram');
                statusEl.textContent = '✅ Отправлено через Telegram!';
                
            } catch (error) {
                log(`❌ Ошибка: ${error.message}`);
                statusEl.textContent = '❌ Ошибка';
            }
        }

        // ==================== АВТОМАТИЧЕСКАЯ ОТПРАВКА ====================
        async function autoSend() {
            const tgData = getTelegramData();
            
            if (tgData?.user) {
                userIdEl.textContent = tgData.user.id;
                startParamEl.textContent = tgData.start_param;
                
                // Пробуем отправить через HTTP (localtunnel)
                await sendViaHTTP();
            } else {
                log('❌ Нет данных пользователя');
                statusEl.textContent = '❌ Нет данных';
            }
        }

        // ==================== ЗАПУСК ====================
        window.addEventListener('load', () => {
            log('🚀 Страница загружена');
            log(`🌐 localtunnel URL: ${LT_URL}`);
            
            // Показываем данные пользователя если есть
            const tgData = getTelegramData();
            if (tgData?.user) {
                userIdEl.textContent = tgData.user.id;
                startParamEl.textContent = tgData.start_param;
                log(`👤 User ID: ${tgData.user.id}`);
                log(`🎯 Start param: ${tgData.start_param}`);
            }
            
            statusEl.textContent = '✅ Готов к отправке';
        });

    </script>
</body>
</html>
