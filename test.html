<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ТЕСТ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; }
        .error { color: #f00; }
        img { max-width: 100%; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="log">🔍 Загрузка...</div>
    <div id="images"></div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('post') || '21-03_13-10';
        const log = document.getElementById('log');
        const imagesDiv = document.getElementById('images');
        
        log.innerHTML = `📁 Пост: ${postId}<br>🔄 Проверяем папки...`;
        
        async function checkFolder(folder) {
            const url = `https://api.github.com/repos/Sweatyeyes/Bot-Posting/contents/posts/${postId}/${folder}`;
            log.innerHTML += `<br>📂 ${folder}...`;
            try {
                const res = await fetch(url);
                if (!res.ok) throw new Error(`${res.status}`);
                const data = await res.json();
                const imgs = data.filter(f => f.name.match(/\.(jpg|jpeg|png)$/i));
                if (imgs.length === 0) {
                    log.innerHTML += ` ⚠️ пусто`;
                } else {
                    log.innerHTML += ` ✅ ${imgs.length} фото`;
                    for (let img of imgs) {
                        const el = document.createElement('img');
                        el.src = img.download_url;
                        imagesDiv.appendChild(el);
                    }
                }
            } catch(e) {
                log.innerHTML += ` ❌ ${e.message}`;
            }
        }
        
        checkFolder('general');
        checkFolder('banana');
        checkFolder('strawberry');
    </script>
</body>
</html>
