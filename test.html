<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔍 ТЕСТ ПОЛУЧЕНИЯ ДАННЫХ ПОЛЬЗОВАТЕЛЯ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a1a1a;
            color: #fff;
            padding: 15px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #2d2d2d;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #404040;
        }
        h1 {
            color: #ffd700;
            margin-top: 0;
            text-align: center;
            font-size: 22px;
            margin-bottom: 20px;
        }
        .section {
            background: #1a1a1a;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            border-left: 4px solid #2ea6ff;
        }
        .section-title {
            color: #888;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .data-content {
            color: #2ea6ff;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            white-space: pre-wrap;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
        .button-container {
            display: flex;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            background: #2ea6ff;
            color: white;
            border: none;
            padding: 15px 10px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 150px;
        }
        button:hover {
            background: #1a8cff;
            transform: scale(1.02);
        }
        button:active {
            transform: scale(0.98);
        }
        button.success {
            background: #00c851;
        }
        button.secondary {
            background: #6c757d;
        }
        button.warning {
            background: #ffbb33;
            color: #000;
        }
        .message {
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-top: 15px;
            display: none;
            font-weight: bold;
        }
        .success-message {
            background: #00c851;
            color: white;
        }
        .error-message {
            background: #ff4444;
            color: white;
        }
        .info-message {
            background: #2ea6ff;
            color: white;
        }
        .debug {
            background: #000;
            color: #0f0;
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 11px;
            margin-top: 20px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #00ff00;
        }
        .status {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .status-success {
            background: #00c851;
            color: white;
        }
        .status-error {
            background: #ff4444;
            color: white;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 ТЕСТ ПОЛУЧЕНИЯ ДАННЫХ ПОЛЬЗОВАТЕЛЯ</h1>
        
        <div class="section">
            <div class="section-title">
                📦 ДАННЫЕ ИЗ TELEGRAM WEBAPP
                <span id="telegram-status" class="status status-error">❌ НЕТ ДАННЫХ</span>
            </div>
            <div id="telegram-data" class="data-content">Загрузка...</div>
        </div>

        <div class="section">
            <div class="section-title">
                📋 ПАРАМЕТРЫ ИЗ URL
                <span id="url-status" class="status status-error">❌ НЕТ</span>
            </div>
            <div id="url-params" class="data-content">Загрузка...</div>
        </div>

        <div class="section">
            <div class="section-title">
                👤 ИНФОРМАЦИЯ О ПОЛЬЗОВАТЕЛЕ
                <span id="user-status" class="status status-error">❌ НЕ ПОЛУЧЕН</span>
            </div>
            <div id="user-data" class="data-content">Загрузка...</div>
        </div>

        <div class="button-container">
            <button onclick="sendToDatabase()" class="success">
                📤 ОТПРАВИТЬ В БАЗУ ДАННЫХ
            </button>
            <button onclick="sendTestData()" class="warning">
                📤 ОТПРАВИТЬ ЧЕРЕЗ WEBAPP
            </button>
        </div>

        <div class="button-container">
            <button onclick="checkTelegram()" class="secondary">
                🔄 ПРОВЕРИТЬ TELEGRAM
            </button>
            <button onclick="clearLogs()" class="secondary">
                🗑 ОЧИСТИТЬ ЛОГ
            </button>
        </div>

        <div id="success-message" class="message success-message">
            ✅ Данные успешно отправлены в базу данных!
        </div>
        <div id="error-message" class="message error-message">
            ❌ Ошибка отправки данных
        </div>
        <div id="info-message" class="message info-message">
            ℹ️ Лог очищен
        </div>

        <div class="debug" id="debug-log"></div>
        
        <div class="footer">
            🕒 <span id="current-time"></span>
        </div>
    </div>

    <script>
        // ==================== НАСТРОЙКИ ====================
        // ВАЖНО: Используем публичный URL от bore!
        const API_URL = 'https://floppy-carrots-yell.loca.lt';
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        let tg = null;
        let telegramData = {};
        let urlParams = {};
        let userInfo = {};
        const debugLog = document.getElementById('debug-log');
        
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logLine = `[${timestamp}] ${message}`;
            
            if (type === 'error') console.error('❌ ' + logLine);
            else if (type === 'warn') console.warn('⚠️ ' + logLine);
            else console.log('🔍 ' + logLine);
            
            debugLog.innerHTML += `<div>${logLine}</div>`;
            debugLog.scrollTop = debugLog.scrollHeight;
            
            document.getElementById('current-time').textContent = new Date().toLocaleTimeString();
        }

        function clearLogs() {
            debugLog.innerHTML = '';
            showMessage('info', 'Лог очищен');
        }

        function updateStatus(elementId, hasData) {
            const element = document.getElementById(elementId);
            if (element) {
                if (hasData) {
                    element.className = 'status status-success';
                    element.innerHTML = '✅ ЕСТЬ ДАННЫЕ';
                } else {
                    element.className = 'status status-error';
                    element.innerHTML = '❌ НЕТ ДАННЫХ';
                }
            }
        }

        function showMessage(type, text) {
            const successMsg = document.getElementById('success-message');
            const errorMsg = document.getElementById('error-message');
            const infoMsg = document.getElementById('info-message');
            
            successMsg.style.display = 'none';
            errorMsg.style.display = 'none';
            infoMsg.style.display = 'none';
            
            if (type === 'success') {
                successMsg.style.display = 'block';
            } else if (type === 'error') {
                errorMsg.style.display = 'block';
            } else if (type === 'info') {
                infoMsg.style.display = 'block';
            }
            
            setTimeout(() => {
                successMsg.style.display = 'none';
                errorMsg.style.display = 'none';
                infoMsg.style.display = 'none';
            }, 3000);
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ TELEGRAM ====================
        try {
            if (window.Telegram?.WebApp) {
                tg = window.Telegram.WebApp;
                tg.ready();
                tg.expand();
                
                log('✅ Telegram WebApp инициализирован');
                
                telegramData = {
                    start_param: tg.initDataUnsafe?.start_param || 'не передан',
                    user: tg.initDataUnsafe?.user || null,
                    query_id: tg.initDataUnsafe?.query_id || 'не передан',
                    auth_date: tg.initDataUnsafe?.auth_date || 'не передан',
                    hash: tg.initDataUnsafe?.hash || 'не передан',
                    chat_instance: tg.initDataUnsafe?.chat_instance || 'не передан',
                    chat_type: tg.initDataUnsafe?.chat_type || 'не передан'
                };
                
                if (tg.initDataUnsafe?.user) {
                    userInfo = {
                        id: tg.initDataUnsafe.user.id || 'не получен',
                        first_name: tg.initDataUnsafe.user.first_name || 'не получен',
                        last_name: tg.initDataUnsafe.user.last_name || 'не получен',
                        username: tg.initDataUnsafe.user.username || 'не получен',
                        language_code: tg.initDataUnsafe.user.language_code || 'не получен',
                        is_premium: tg.initDataUnsafe.user.is_premium || false
                    };
                    updateStatus('user-status', true);
                    log(`👤 User ID из Telegram: ${userInfo.id}`);
                } else {
                    updateStatus('user-status', false);
                }
                
                if (telegramData.start_param !== 'не передан') {
                    log(`🎯 start_param из Telegram: ${telegramData.start_param}`);
                }
                
                updateStatus('telegram-status', telegramData.user !== null);
                
            } else {
                log('❌ Telegram WebApp НЕ найден!', 'error');
            }
        } catch (e) {
            log(`❌ Ошибка инициализации: ${e.message}`, 'error');
        }

        // ==================== ПОЛУЧЕНИЕ ПАРАМЕТРОВ ИЗ URL ====================
        try {
            const urlSearchParams = new URLSearchParams(window.location.search);
            urlParams = {};
            for (const [key, value] of urlSearchParams.entries()) {
                urlParams[key] = value;
            }
            
            if (window.location.hash) {
                const hashParams = new URLSearchParams(window.location.hash.substring(1));
                for (const [key, value] of hashParams.entries()) {
                    urlParams[key] = value;
                }
            }
            
            log(`📦 Параметры URL: ${JSON.stringify(urlParams)}`);
            updateStatus('url-status', Object.keys(urlParams).length > 0);
            
        } catch (e) {
            log(`❌ Ошибка парсинга URL: ${e.message}`, 'error');
        }

        // ==================== ОТОБРАЖЕНИЕ ДАННЫХ ====================
        document.getElementById('telegram-data').innerHTML = 
            JSON.stringify(telegramData, null, 2).replace(/\n/g, '<br>');
        
        document.getElementById('url-params').innerHTML = 
            Object.keys(urlParams).length > 0 
                ? JSON.stringify(urlParams, null, 2).replace(/\n/g, '<br>')
                : 'нет параметров';
        
        document.getElementById('user-data').innerHTML = 
            JSON.stringify(userInfo, null, 2).replace(/\n/g, '<br>');

        // ==================== ФУНКЦИИ ОТПРАВКИ ====================

        async function sendToDatabase() {
            // Формируем данные для отправки
            const dataToSend = {
                type: 'webapp_data',
                source: 'test_html',
                timestamp: Date.now(),
                user_id: userInfo.id,
                username: userInfo.username,
                first_name: userInfo.first_name,
                last_name: userInfo.last_name,
                start_param: telegramData.start_param,
                chat_instance: telegramData.chat_instance,
                chat_type: telegramData.chat_type,
                url_params: urlParams,
                page_url: window.location.href,
                user_agent: navigator.userAgent,
                platform: navigator.platform
            };

            log(`📤 Отправка данных на ${API_URL}/api/webapp-data...`);
            log(`📦 Данные: ${JSON.stringify(dataToSend, null, 2)}`);

            try {
                const response = await fetch(`${API_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(dataToSend)
                });

                if (response.ok) {
                    const result = await response.json();
                    log(`✅ Успех: ${JSON.stringify(result)}`);
                    showMessage('success', 'Данные отправлены');
                    
                    // Сохраняем в localStorage как резервную копию
                    const savedData = JSON.parse(localStorage.getItem('webapp_data') || '[]');
                    savedData.push({
                        ...dataToSend,
                        status: 'sent',
                        sent_at: new Date().toISOString()
                    });
                    localStorage.setItem('webapp_data', JSON.stringify(savedData.slice(-10)));
                    
                } else {
                    const error = await response.text();
                    log(`❌ Ошибка HTTP ${response.status}: ${error}`, 'error');
                    showMessage('error', `Ошибка ${response.status}`);
                    
                    // Сохраняем ошибку
                    const savedData = JSON.parse(localStorage.getItem('webapp_data') || '[]');
                    savedData.push({
                        ...dataToSend,
                        error: `HTTP ${response.status}`,
                        failed_at: new Date().toISOString()
                    });
                    localStorage.setItem('webapp_data', JSON.stringify(savedData.slice(-10)));
                }
            } catch (error) {
                log(`❌ Ошибка сети: ${error.message}`, 'error');
                showMessage('error', 'Ошибка сети');
                
                // Сохраняем ошибку
                const savedData = JSON.parse(localStorage.getItem('webapp_data') || '[]');
                savedData.push({
                    ...dataToSend,
                    error: error.message,
                    failed_at: new Date().toISOString()
                });
                localStorage.setItem('webapp_data', JSON.stringify(savedData.slice(-10)));
            }
        }

        function sendTestData() {
            const dataToSend = {
                type: 'webapp_data_legacy',
                source: 'test_html',
                timestamp: Date.now(),
                telegram: telegramData,
                url_params: urlParams,
                user: userInfo,
                page_url: window.location.href
            };

            log(`📤 Отправка через tg.sendData()`);

            try {
                if (tg) {
                    tg.sendData(JSON.stringify(dataToSend));
                    log('✅ Данные отправлены через tg.sendData()');
                    showMessage('success', 'Отправлено через WebApp');
                } else {
                    log('❌ Telegram WebApp не доступен', 'error');
                    showMessage('error', 'WebApp не доступен');
                }
            } catch (e) {
                log(`❌ Ошибка: ${e.message}`, 'error');
                showMessage('error', e.message);
            }
        }

        function checkTelegram() {
            log('🔍 Проверка Telegram...');
            log(`📱 Telegram WebApp доступен: ${tg !== null}`);
            if (tg) {
                log(`📦 initDataUnsafe: ${JSON.stringify(tg.initDataUnsafe)}`);
                log(`🎯 start_param: ${tg.initDataUnsafe?.start_param || 'не передан'}`);
                log(`👤 user: ${tg.initDataUnsafe?.user ? 'есть' : 'нет'}`);
                log(`💬 chat_instance: ${tg.initDataUnsafe?.chat_instance || 'нет'}`);
                log(`📊 chat_type: ${tg.initDataUnsafe?.chat_type || 'нет'}`);
            }
        }

        // ==================== ПРОВЕРКА СОХРАНЕННЫХ ДАННЫХ ====================
        function checkStoredData() {
            const savedData = localStorage.getItem('webapp_data');
            if (savedData) {
                const data = JSON.parse(savedData);
                log(`📦 Локально сохранено ${data.length} записей`);
                if (data.length > 0) {
                    log(`📋 Последняя: ${JSON.stringify(data[data.length-1])}`);
                }
            } else {
                log('📭 Нет сохраненных данных');
            }
        }

        // Логируем информацию о загрузке
        log('🚀 Страница загружена');
        log(`🌐 API_URL: ${API_URL}`);
        checkTelegram();
        checkStoredData();

    </script>
</body>
</html>
