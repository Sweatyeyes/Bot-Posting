<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; color: #fff; font-family: monospace; }
        #log { padding: 20px; font-size: 11px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
        .error { color: #ff453a; font-weight: bold; }
        .success { color: #32d74b; font-weight: bold; }
        .viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="log">🚀 Система запущена...</div>
    <div id="viewer" class="viewer"><img id="pic" src=""></div>

<script>
    const log = (msg, cls) => {
        const div = document.getElementById('log');
        if (div) div.innerHTML += `<div class="${cls || ''}">${msg}</div>`;
    };

    function startApp() {
        try {
            // ПРОВЕРКА SDK
            if (!window.Telegram || !window.Telegram.WebApp) {
                log("⏳ Ожидание SDK...", "error");
                setTimeout(startApp, 300);
                return;
            }

            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
            log("✅ SDK OK");

            // НАСТРОЙКИ (ТВОЙ VIP ID ВСТАВЛЕН)
            const REPO = "Sweatyeyes/Bot-Posting";
            const VIP_USERS =; 
            const user = tg.initDataUnsafe?.user;
            const userId = user ? user.id : null;
            const isVip = VIP_USERS.includes(userId);

            log(`👤 ID: ${userId || 'Гость'} | 💎 VIP: ${isVip ? 'ДА' : 'НЕТ'}`);

            // ПОИСК ПАПКИ
            const urlParams = new URLSearchParams(window.location.search);
            const postFolder = tg.initDataUnsafe?.start_param || urlParams.get('post') || urlParams.get('startapp');

            if (!postFolder) {
                log("❌ ОШИБКА: ID папки не найден!", "error");
                log("Проверь ссылку в Боте 1: должна быть ?startapp=...");
                return;
            }

            log(`📂 Папка: posts/${postFolder}`, "success");
            loadContent(postFolder, REPO, isVip);

        } catch (e) {
            log(`❌ КРИТИЧЕСКАЯ ОШИБКА: ${e.message}`, "error");
        }
    }

    async function loadContent(folder, repo, isVip) {
        log("📡 Запрос к GitHub API...");
        let foundFiles = [];
        
        try {
            const folders = ["general", "vip"];
            for (const fld of folders) {
                const res = await fetch(`https://api.github.com{repo}/contents/posts/${folder}/${fld}`);
                if (res.ok) {
                    const data = await res.json();
                    log(`✅ ${fld}: ${data.length} файлов`);
                    data.forEach(file => {
                        if (!file.name.startsWith('blur_')) foundFiles.push(`${fld}/${file.name}`);
                    });
                } else {
                    log(`⚠️ ${fld}: код ${res.status}`);
                }
            }

            if (foundFiles.length > 0) {
                log("🚀 ЗАПУСК ГАЛЕРЕИ...", "success");
                setTimeout(() => {
                    document.getElementById('viewer').style.display = 'flex';
                    runViewer(foundFiles, folder, repo, isVip);
                }, 1000);
            } else {
                log("❌ Файлов на GitHub нет!", "error");
            }
        } catch (e) {
            log(`❌ ОШИБКА API: ${e.message}`, "error");
        }
    }

    function runViewer(files, folder, repo, isVip) {
        let cur = 0;
        const pic = document.getElementById('pic');
        const update = () => {
            const path = files[cur];
            const baseUrl = `https://raw.githubusercontent.com{repo}/main/posts/${folder}/`;
            let url = baseUrl + path;
            
            if (!isVip && path.startsWith('vip/')) {
                url = baseUrl + "vip/blur_" + path.split('/').pop();
            }
            pic.src = url;
        };
        update();
        document.getElementById('viewer').onclick = () => { 
            cur = (cur + 1) % files.length;
            update();
        };
    }

    startApp();
</script>
</body>
</html>
