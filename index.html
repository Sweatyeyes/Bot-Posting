<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Правильный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>Telegram Gallery</title>
    
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Основные стили */
        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            touch-action: pan-y pinch-zoom;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #2ea6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 16px;
            margin-top: 10px;
            text-align: center;
        }

        .loading-progress {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #2ea6ff;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        /* Основной экран галереи */
        #gallery-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
        }

        /* Контейнер для изображения */
        #image-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }

        /* Изображение */
        #gallery-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.2s ease;
            opacity: 0;
            will-change: transform;
            pointer-events: none; /* Важно для Android */
        }

        #gallery-image.loaded {
            opacity: 1;
        }

        /* Индикатор загрузки изображения */
        .image-loader {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
            z-index: 1001;
        }

        .image-loader.active {
            display: block;
        }

        /* Счетчик изображений */
        #image-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1002;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        /* VIP бейдж */
        #vip-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #000;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            z-index: 1001;
            border: 1px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
            display: none;
            pointer-events: none; /* Важно для Android */
        }

        /* Кнопка назад */
        #back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 44px; /* Увеличен для Android */
            height: 44px; /* Увеличен для Android */
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        #back-button:active {
            background: rgba(0, 0, 0, 0.8);
        }

        /* Экран ошибки */
        #error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 3000;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .error-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff3b30;
        }

        .error-message {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            max-width: 300px;
            line-height: 1.5;
        }

        .retry-button {
            background: #2ea6ff;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(46, 166, 255, 0.3);
            -webkit-tap-highlight-color: transparent;
        }

        .retry-button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* Информация о посте */
        #post-info {
            position: absolute;
            top: 70px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1001;
            max-width: calc(100% - 80px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            pointer-events: none; /* Важно для Android */
        }

        /* Подсказка для свайпа */
        #swipe-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 1;
            z-index: 1001;
            pointer-events: none;
        }

        #swipe-hint.fade-out {
            opacity: 0;
        }

        /* Навигационные зоны (для Android) */
        .nav-zone {
            position: absolute;
            top: 0;
            width: 30%;
            height: 100%;
            z-index: 1000;
            -webkit-tap-highlight-color: transparent;
        }

        #nav-left {
            left: 0;
        }

        #nav-right {
            right: 0;
        }

        /* Оптимизация для Android */
        @media (pointer: coarse) {
            #back-button {
                width: 48px;
                height: 48px;
                font-size: 28px;
            }
            
            .retry-button {
                padding: 18px 48px;
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <!-- Навигационные зоны (для Android) -->
    <div id="nav-left" class="nav-zone" onclick="prevImage()"></div>
    <div id="nav-right" class="nav-zone" onclick="nextImage()"></div>

    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Загрузка галереи...</div>
        <div class="loading-progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- Основной экран галереи -->
    <div id="gallery-screen">
        <div id="back-button" onclick="closeGallery()">←</div>
        <div id="post-info"></div>
        <div id="vip-badge">VIP</div>
        
        <div id="image-container">
            <div class="image-loader" id="image-loader"></div>
            <img id="gallery-image" src="" alt="Gallery image" onload="onImageLoad()" onerror="onImageError()">
        </div>
        
        <div id="image-counter">1 / 1</div>
        <div id="swipe-hint">👆 Листайте тапая по краям</div>
    </div>

    <!-- Экран ошибки -->
    <div id="error-screen">
        <div class="error-icon">😢</div>
        <div class="error-title">Упс!</div>
        <div class="error-message" id="error-message">Что-то пошло не так</div>
        <button class="retry-button" onclick="location.reload()">Попробовать снова</button>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const CONFIG = {
            REPO: "Sweatyeyes/Bot-Posting",
            BRANCH: "main",
            GITHUB_RAW: "https://raw.githubusercontent.com",
            GITHUB_API: "https://api.github.com/repos",
            VIP_USERS: [337383733],
            TIMEOUT: 15000,  // Увеличен для Android
            MAX_RETRIES: 3,
            SUPPORTED_FORMATS: ['.jpg', '.jpeg', '.png', '.gif', '.webp'],
            MAX_IMAGE_SIZE: 20 * 1024 * 1024, // 20MB максимальный размер
            CACHE_SIZE: 5 // Кэшировать 5 изображений
        };

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        const state = {
            files: [],
            currentIndex: 0,
            isVip: false,
            postId: null,
            userId: null,
            isLoading: true,
            touchStartX: 0,
            touchStartY: 0,
            preloadedImages: [],
            retryCount: 0,
            isAndroid: /Android/i.test(navigator.userAgent),
            imageCache: new Map()
        };

        console.log('📱 Платформа:', state.isAndroid ? 'Android' : 'iOS');

        // --- ИНИЦИАЛИЗАЦИЯ TELEGRAM WEBAPP ---
        let tg = null;
        
        function initTelegram() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    tg = window.Telegram.WebApp;
                    
                    // Важно для Android: небольшая задержка
                    setTimeout(() => {
                        tg.ready();
                        tg.expand();
                        
                        // Не включаем подтверждение закрытия на Android
                        if (!state.isAndroid) {
                            tg.enableClosingConfirmation();
                        }
                    }, 100);
                    
                    console.log('✅ Telegram WebApp инициализирован');
                    return true;
                } else {
                    console.log('❌ Telegram WebApp не найден');
                    return false;
                }
            } catch (e) {
                console.error('❌ Ошибка инициализации Telegram:', e);
                return false;
            }
        }

        // --- ПОЛУЧЕНИЕ ПАРАМЕТРОВ ---
        function getUrlParams() {
            console.log('🔍 Получение параметров...');
            
            const params = new URLSearchParams(window.location.search);
            let postId = null;
            
            // 1. Сначала проверяем start_param из Telegram
            if (window.Telegram?.WebApp?.initDataUnsafe?.start_param) {
                postId = window.Telegram.WebApp.initDataUnsafe.start_param;
                console.log('📦 start_param из Telegram:', postId);
            }
            
            // 2. Если нет, пробуем из URL
            if (!postId) {
                postId = params.get('startapp') || params.get('post') || params.get('id');
                console.log('📦 Параметр из URL:', postId);
            }
            
            // Очищаем от префиксов
            if (postId && postId.startsWith('gallery_')) {
                postId = postId.replace('gallery_', '');
            }
            
            return {
                post: postId,
                vip: params.get('vip') === 'true',
                user: params.get('user')
            };
        }

        // --- ФУНКЦИИ ДЛЯ РАБОТЫ С GITHUB ---
        async function fetchWithTimeout(url, options = {}) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);
            
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        ...options.headers
                    }
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }

        async function checkPostExists(postId) {
            const url = `${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}`;
            
            try {
                const response = await fetchWithTimeout(url);
                return response.status === 200;
            } catch (e) {
                console.error('Ошибка проверки поста:', e);
                return false;
            }
        }

        async function loadFilesFromFolder(postId, folder) {
            const url = `${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}/${folder}`;
            
            try {
                const response = await fetchWithTimeout(url);
                
                if (response.status === 404) return [];
                if (!response.ok) return [];
                
                const data = await response.json();
                
                if (!Array.isArray(data)) return [];
                
                return data
                    .filter(item => {
                        const ext = item.name.toLowerCase().slice(item.name.lastIndexOf('.'));
                        return CONFIG.SUPPORTED_FORMATS.includes(ext) && 
                               !item.name.startsWith('blur_') &&
                               item.size < CONFIG.MAX_IMAGE_SIZE; // Фильтр по размеру
                    })
                    .map(item => ({
                        name: item.name,
                        path: `${folder}/${item.name}`,
                        url: `${CONFIG.GITHUB_RAW}/${CONFIG.REPO}/${CONFIG.BRANCH}/posts/${postId}/${folder}/${item.name}`,
                        size: item.size
                    }));
                
            } catch (e) {
                console.error(`Ошибка загрузки ${folder}:`, e);
                return [];
            }
        }

        function updateLoadingProgress(percent, text) {
            const progressBar = document.getElementById('progress-bar');
            const loadingText = document.getElementById('loading-text');
            
            if (progressBar) progressBar.style.width = percent + '%';
            if (loadingText && text) loadingText.textContent = text;
        }

        function showError(message) {
            console.error('❌ Ошибка:', message);
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('gallery-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-message').textContent = message;
        }

        // --- ЗАГРУЗКА ГАЛЕРЕИ ---
        async function loadGallery(postId, isVip, userId) {
            console.log(`🚀 Загрузка галереи: ${postId}, VIP: ${isVip}`);
            
            updateLoadingProgress(10, 'Проверка поста...');
            
            try {
                const exists = await checkPostExists(postId);
                
                if (!exists) {
                    showError(`Пост "${postId}" не найден`);
                    return;
                }
                
                updateLoadingProgress(30, 'Загрузка изображений...');
                
                const [generalFiles, vipFiles] = await Promise.all([
                    loadFilesFromFolder(postId, 'general'),
                    loadFilesFromFolder(postId, 'vip')
                ]);
                
                let files = [];
                
                // Добавляем общие фото
                files.push(...generalFiles.map(f => ({...f, type: 'general'})));
                
                // Добавляем VIP фото
                if (isVip) {
                    files.push(...vipFiles.map(f => ({...f, type: 'vip'})));
                } else {
                    vipFiles.forEach(file => {
                        files.push({
                            ...file,
                            url: file.url.replace('/vip/', '/vip/blur_'),
                            type: 'vip-blurred',
                            isBlurred: true
                        });
                    });
                }
                
                if (files.length === 0) {
                    showError('В этом посте нет изображений');
                    return;
                }
                
                files.sort((a, b) => a.name.localeCompare(b.name));
                
                state.files = files;
                state.postId = postId;
                state.isVip = isVip;
                state.userId = userId;
                
                updateLoadingProgress(100, `Готово! ${files.length} фото`);
                
                document.getElementById('post-info').textContent = `📁 ${postId}`;
                
                if (isVip) {
                    document.getElementById('vip-badge').style.display = 'block';
                }
                
                // Небольшая задержка для Android
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('gallery-screen').style.display = 'block';
                        showImage(0);
                        
                        // Отправляем статистику с задержкой для Android
                        if (tg && !state.isAndroid) {
                            try {
                                tg.sendData(JSON.stringify({
                                    action: 'view',
                                    post: postId,
                                    files: files.length
                                }));
                            } catch (e) {}
                        }
                        
                        setTimeout(() => {
                            document.getElementById('swipe-hint').classList.add('fade-out');
                        }, 3000);
                    }, 300);
                }, state.isAndroid ? 200 : 100);
                
            } catch (error) {
                console.error('❌ Ошибка загрузки:', error);
                showError(`Ошибка загрузки: ${error.message}`);
            }
        }

        // --- ФУНКЦИИ ГАЛЕРЕИ ---
        function preloadImage(url) {
            if (state.imageCache.has(url)) return;
            
            const img = new Image();
            img.onload = () => {
                state.imageCache.set(url, img);
                // Ограничиваем размер кэша
                if (state.imageCache.size > CONFIG.CACHE_SIZE) {
                    const firstKey = state.imageCache.keys().next().value;
                    state.imageCache.delete(firstKey);
                }
            };
            img.src = url;
        }

        function showImage(index) {
            if (!state.files.length) return;
            
            if (index < 0) index = state.files.length - 1;
            if (index >= state.files.length) index = 0;
            
            state.currentIndex = index;
            
            const file = state.files[index];
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            const counter = document.getElementById('image-counter');
            
            img.classList.remove('loaded');
            loader.classList.add('active');
            
            counter.textContent = `${index + 1} / ${state.files.length}`;
            
            // Обновляем информацию о посте
            let typeInfo = '';
            if (file.type === 'vip') {
                typeInfo = ' (VIP)';
                document.getElementById('vip-badge').style.display = 'block';
            } else {
                document.getElementById('vip-badge').style.display = 'none';
            }
            
            document.getElementById('post-info').textContent = `📁 ${state.postId}${typeInfo}`;
            
            // Загружаем изображение
            img.src = file.url;
            
            // Предзагружаем следующие
            const nextIndices = [
                (index + 1) % state.files.length,
                (index + 2) % state.files.length
            ];
            
            nextIndices.forEach(i => {
                const nextFile = state.files[i];
                if (nextFile && !state.imageCache.has(nextFile.url)) {
                    preloadImage(nextFile.url);
                }
            });
        }

        function onImageLoad() {
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            
            img.classList.add('loaded');
            loader.classList.remove('active');
        }

        function onImageError() {
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            
            console.error('Ошибка загрузки изображения');
            
            loader.classList.remove('active');
            
            if (state.retryCount < CONFIG.MAX_RETRIES) {
                state.retryCount++;
                setTimeout(() => {
                    img.src = img.src.split('?')[0] + '?retry=' + Date.now();
                }, 1000);
            } else {
                img.classList.add('loaded');
            }
        }

        // --- НАВИГАЦИЯ ---
        function nextImage() {
            if (!state.files.length) return;
            showImage(state.currentIndex + 1);
        }

        function prevImage() {
            if (!state.files.length) return;
            showImage(state.currentIndex - 1);
        }

        function closeGallery() {
            if (tg) {
                try {
                    tg.close();
                } catch (e) {
                    window.close();
                }
            } else {
                window.close();
            }
        }

        // --- ОБРАБОТЧИКИ КАСАНИЙ (для свайпов) ---
        function handleTouchStart(e) {
            state.touchStartX = e.touches[0].clientX;
            state.touchStartY = e.touches[0].clientY;
        }

        function handleTouchEnd(e) {
            if (!state.touchStartX || !state.touchStartY) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const diffX = touchEndX - state.touchStartX;
            const diffY = touchEndY - state.touchStartY;
            
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    prevImage();
                } else {
                    nextImage();
                }
            }
            
            state.touchStartX = 0;
            state.touchStartY = 0;
        }

        // --- ГЛАВНАЯ ФУНКЦИЯ ---
        async function init() {
            console.log('🚀 Инициализация...');
            
            initTelegram();
            
            const params = getUrlParams();
            
            if (!params.post) {
                showError('Не указан ID поста.\n\nСсылка должна содержать ?startapp=НАЗВАНИЕ_ПАПКИ');
                return;
            }
            
            const cleanPostId = params.post.replace(/[^a-zA-Z0-9_\-]/g, '');
            const isVip = params.vip || CONFIG.VIP_USERS.includes(parseInt(params.user));
            
            await loadGallery(cleanPostId, isVip, params.user);
        }

        // --- ОБРАБОТЧИКИ СОБЫТИЙ ---
        window.addEventListener('load', init);
        
        // Оптимизация для Android
        if (/Android/i.test(navigator.userAgent)) {
            // Отключаем двойной тап для зума
            document.addEventListener('touchstart', (e) => {
                if (e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        // Добавляем обработчики свайпов
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('image-container');
            if (container) {
                container.addEventListener('touchstart', handleTouchStart, { passive: true });
                container.addEventListener('touchend', handleTouchEnd);
            }
        });

        // Экспортируем функции в глобальную область
        window.nextImage = nextImage;
        window.prevImage = prevImage;
        window.closeGallery = closeGallery;
        window.onImageLoad = onImageLoad;
        window.onImageError = onImageError;
    </script>
</body>
</html>
