<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: -apple-system, sans-serif; }
        .counter { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 16px; z-index: 10; font-weight: bold; }
        .viewer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.3s; }
        .debug { position: absolute; top: 50px; width: 100%; text-align: center; font-size: 10px; color: #555; }
    </style>
</head>
<body>
    <div class="counter" id="counter">Загрузка...</div>
    <div class="debug" id="debug"></div>
    <div class="viewer" id="main-zone"><img id="main-photo" src="" style="opacity:0"></div>

<script>
    const REPO_OWNER = "Sweatyeyes";
    const REPO_NAME = "Bot-Posting";
    const VIP_USERS = [337383733];

    const tg = window.Telegram.WebApp;
    tg.expand();

    const userId = tg.initDataUnsafe?.user?.id;
    const isVip = VIP_USERS.includes(userId);
    
    // Пытаемся достать ID папки
    const urlParams = new URLSearchParams(window.location.search);
    const postFolder = tg.initDataUnsafe?.start_param || urlParams.get('post');

    document.getElementById('debug').innerText = `Folder: ${postFolder} | VIP: ${isVip}`;

    let photos = [];
    let cur = 0;

    async function fetchFiles() {
        if (!postFolder) {
            document.getElementById('counter').innerText = "ID не найден";
            return;
        }

        try {
            const folders = ["general", "vip"];
            for (const fld of folders) {
                const res = await fetch(`https://api.github.com{REPO_OWNER}/${REPO_NAME}/contents/posts/${postFolder}/${fld}`);
                if (res.ok) {
                    const data = await res.json();
                    data.forEach(f => {
                        if (!f.name.startsWith('blur_')) photos.push(`${fld}/${f.name}`);
                    });
                }
            }
            if (photos.length > 0) updateGallery();
            else document.getElementById('counter').innerText = "Папка пуста";
        } catch (e) {
            document.getElementById('counter').innerText = "Ошибка GitHub";
        }
    }

    function updateGallery() {
        const img = document.getElementById('main-photo');
        const currentFile = photos[cur];
        const baseUrl = `https://raw.githubusercontent.com{REPO_OWNER}/${REPO_NAME}/main/posts/${postFolder}/`;
        
        let finalUrl = baseUrl + currentFile;
        if (!isVip && currentFile.startsWith('vip/')) {
            finalUrl = baseUrl + "vip/blur_" + currentFile.split('/').pop();
        }

        img.src = finalUrl;
        document.getElementById('counter').innerText = `${cur + 1} / ${photos.length}`;
        img.onload = () => { img.style.opacity = 1; };
    }

    // Листание тапом по краям
    document.getElementById('main-zone').onclick = (e) => {
        const x = e.clientX;
        if (x < window.innerWidth / 3) cur = (cur - 1 + photos.length) % photos.length;
        else cur = (cur + 1) % photos.length;
        document.getElementById('main-photo').style.opacity = 0;
        updateGallery();
    };

    fetchFiles();
</script>
</body>
</html>
