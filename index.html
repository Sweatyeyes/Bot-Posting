<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>Telegram Gallery</title>
    
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #2ea6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 16px;
            margin-top: 10px;
            text-align: center;
        }

        .loading-progress {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #2ea6ff;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        /* Основной экран галереи */
        #gallery-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
            flex-direction: column;
        }

        /* Верхняя панель */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 1002;
            display: flex;
            align-items: center;
            padding: 0 15px;
            pointer-events: none;
        }

        #back-button {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s ease;
        }

        #back-button:active {
            background: rgba(0, 0, 0, 0.8);
        }

        /* VIP бейдж */
        #vip-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #000;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
            z-index: 1002;
            display: none;
        }

        /* Контейнер для изображения */
        #image-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 0;
        }

        #gallery-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.2s ease;
            opacity: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        #gallery-image.loaded {
            opacity: 1;
        }

        /* Навигационные зоны */
        .nav-zone {
            position: absolute;
            top: 60px;
            bottom: 80px;
            width: 30%;
            z-index: 1001;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        #nav-left {
            left: 0;
        }

        #nav-right {
            right: 0;
        }

        /* Индикатор навигации */
        .nav-hint {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        #nav-left .nav-hint {
            left: 10px;
        }

        #nav-right .nav-hint {
            right: 10px;
        }

        .nav-zone:active .nav-hint {
            opacity: 0.5;
        }

        /* Индикатор загрузки */
        .image-loader {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .image-loader.active {
            display: block;
        }

        /* Нижняя панель */
        #bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 1002;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 25px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Кнопка с клубничкой */
        #strawberry-link {
            text-decoration: none;
        }

        #strawberry-button {
            width: 60px;
            height: 60px;
            background: transparent;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            text-shadow: 0 2px 10px rgba(255, 59, 111, 0.5);
        }

        #strawberry-button:active {
            transform: scale(0.9);
            opacity: 0.8;
        }

        /* Кнопка сохранить */
        #save-button {
            width: 60px;
            height: 60px;
            background: transparent;
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            text-shadow: 0 2px 10px rgba(46, 166, 255, 0.5);
        }

        #save-button:active {
            transform: scale(0.9);
            opacity: 0.8;
        }

        #save-button.vip-only {
            opacity: 0.4;
            text-shadow: none;
        }

        /* Счетчик изображений */
        #image-counter {
            color: white;
            font-size: 16px;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 8px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            white-space: nowrap;
            letter-spacing: 0.5px;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 20px;
        }

        /* Подсказка */
        #swipe-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: opacity 0.5s ease;
            opacity: 1;
            z-index: 1003;
            pointer-events: none;
            white-space: nowrap;
        }

        #swipe-hint.fade-out {
            opacity: 0;
        }

        /* Уведомление */
        #notification {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 16px;
            text-align: center;
            z-index: 3000;
            transform: translateY(300%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            pointer-events: none;
        }

        #notification.show {
            transform: translateY(0);
        }

        #notification.hide {
            transform: translateY(400%);
        }

        .notification-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .notification-icon {
            font-size: 24px;
        }

        /* Экран ошибки */
        #error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 3000;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .error-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff3b30;
        }

        .error-message {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            max-width: 300px;
            line-height: 1.5;
        }

        .retry-button {
            background: #2ea6ff;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-button:active {
            transform: scale(0.95);
        }

        /* Отладочная панель */
        #debug-panel {
            position: fixed;
            top: 60px;
            left: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #0f0;
            padding: 15px;
            border-radius: 10px;
            font-size: 12px;
            font-family: monospace;
            border: 2px solid #ff0;
            z-index: 10000;
            max-height: 200px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
            display: block;
        }

        #debug-panel .title {
            color: #ff0;
            font-weight: bold;
            margin-bottom: 5px;
            text-align: center;
        }

        #debug-panel .close-btn {
            position: absolute;
            top: 5px;
            right: 10px;
            color: #fff;
            cursor: pointer;
            font-size: 16px;
        }

        @media (max-width: 400px) {
            #bottom-bar {
                padding: 0 15px;
                height: 70px;
            }
            
            #strawberry-button, #save-button {
                width: 50px;
                height: 50px;
                font-size: 32px;
            }
            
            #image-counter {
                padding: 6px 16px;
                font-size: 14px;
                bottom: 15px;
            }
            
            #notification {
                bottom: 80px;
                padding: 12px 16px;
                font-size: 14px;
                transform: translateY(350%);
            }
            
            #notification.hide {
                transform: translateY(500%);
            }
            
            #debug-panel {
                top: 50px;
                font-size: 10px;
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Отладочная панель -->
    <div id="debug-panel">
        <div class="title">🔍 ОТЛАДКА (СБОР ДАННЫХ)</div>
        <div class="close-btn" onclick="this.parentElement.style.display='none'">✖</div>
        <div id="debug-content">Загрузка...</div>
    </div>

    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Загрузка галереи...</div>
        <div class="loading-progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- Основной экран галереи -->
    <div id="gallery-screen">
        <div id="top-bar">
            <div id="back-button" onclick="closeGallery()">←</div>
        </div>

        <div id="vip-badge">VIP</div>

        <div id="nav-left" class="nav-zone" onclick="prevImage()">
            <div class="nav-hint">‹</div>
        </div>
        <div id="nav-right" class="nav-zone" onclick="nextImage()">
            <div class="nav-hint">›</div>
        </div>

        <div id="image-container">
            <div class="image-loader" id="image-loader"></div>
            <img id="gallery-image" src="" alt="Gallery image" onload="onImageLoad()" onerror="onImageError()">
        </div>

        <div id="bottom-bar">
            <a href="https://t.me/neuroticababes_bot" target="_blank" id="strawberry-link">
                <button id="strawberry-button" title="Нейроклубничка™">
                    <span>🍓</span>
                </button>
            </a>
            
            <div id="image-counter">1 / 1</div>
            
            <button id="save-button" onclick="handleSave()" title="Сохранить">
                <span>💾</span>
            </button>
        </div>

        <div id="swipe-hint">👆 Тапайте по краям для навигации</div>
    </div>

    <!-- Уведомление -->
    <div id="notification">
        <div class="notification-content">
            <span class="notification-icon">🔒</span>
            <span id="notification-text">Доступно только для подписчиков канала</span>
        </div>
    </div>

    <!-- Экран ошибки -->
    <div id="error-screen">
        <div class="error-icon">😢</div>
        <div class="error-title">Упс!</div>
        <div class="error-message" id="error-message">Что-то пошло не так</div>
        <button class="retry-button" onclick="location.reload()">Попробовать снова</button>
    </div>

    <script>
        // ==================== ОТЛАДКА ====================
        const DEBUG_MODE = true;

        function debugLog(message, type = 'info') {
            if (!DEBUG_MODE) return;
            
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}`;
            
            if (type === 'error') console.error('❌ ' + logMessage);
            else if (type === 'warn') console.warn('⚠️ ' + logMessage);
            else console.log('🔍 ' + logMessage);
            
            const debugContent = document.getElementById('debug-content');
            if (debugContent) {
                const color = type === 'error' ? '#ff6b6b' : (type === 'warn' ? '#ffd700' : '#0f0');
                debugContent.innerHTML += `<div style="color: ${color}">${logMessage}</div>`;
                debugContent.scrollTop = debugContent.scrollHeight;
            }
        }

        function clearDebug() {
            const debugContent = document.getElementById('debug-content');
            if (debugContent) debugContent.innerHTML = '';
        }

        // ==================== КОНФИГУРАЦИЯ ====================
        const CONFIG = {
            REPO: "Sweatyeyes/Bot-Posting",
            BRANCH: "main",
            GITHUB_RAW: "https://raw.githubusercontent.com",
            GITHUB_API: "https://api.github.com/repos",
            TIMEOUT: 10000,
            MAX_RETRIES: 3,
            SUPPORTED_FORMATS: ['.jpg', '.jpeg', '.png', '.gif', '.webp']
        };

        // ==================== СОСТОЯНИЕ ====================
        const state = {
            files: [],
            currentIndex: 0,
            isVip: false,
            postId: null,
            userId: null,
            touchStartX: 0,
            preloadedImages: new Set(),
            retryCount: 0,
            generalCount: 0,
            vipCount: 0,
            viewedImages: new Set() // Для отслеживания просмотренных фото
        };

        // ==================== TELEGRAM INIT ====================
        let tg = null;
        
        function initTelegram() {
            debugLog('🔍 Проверка Telegram WebApp...');
            
            try {
                if (window.Telegram?.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    
                    debugLog('✅ Telegram WebApp найден!');
                    
                    if (tg.initDataUnsafe?.user) {
                        state.userId = tg.initDataUnsafe.user.id;
                        debugLog(`👤 User ID из Telegram: ${state.userId}`);
                    }
                    
                    if (tg.initDataUnsafe?.start_param) {
                        debugLog(`🎯 start_param: ${tg.initDataUnsafe.start_param}`);
                    }
                    
                    return true;
                } else {
                    debugLog('❌ Telegram WebApp НЕ найден!', 'error');
                    return false;
                }
            } catch (e) {
                debugLog(`❌ Ошибка инициализации Telegram: ${e.message}`, 'error');
                return false;
            }
        }

        // ==================== ОТПРАВКА ДАННЫХ БОТУ ====================
        function sendUserData(action, details = {}) {
            try {
                if (!tg) {
                    debugLog('⚠️ Telegram WebApp не инициализирован', 'warn');
                    return;
                }
                
                const data = {
                    action: action,
                    user_id: state.userId,
                    post_id: state.postId,
                    is_vip: state.isVip,
                    timestamp: Date.now(),
                    current_index: state.currentIndex,
                    total_files: state.files.length,
                    ...details
                };
                
                const dataStr = JSON.stringify(data);
                debugLog(`📤 Отправка данных боту: ${action} (${dataStr.length} байт)`, 'info');
                
                // Отправляем данные через Telegram Bot API
                tg.sendData(dataStr);
                
            } catch (e) {
                debugLog(`❌ Ошибка отправки данных: ${e.message}`, 'error');
            }
        }

        // ==================== ПОЛУЧЕНИЕ ПАРАМЕТРОВ ====================
        function getUrlParams() {
            debugLog('🔍 Получение параметров из URL и Telegram...');
            
            let postId = null;
            let vip = false;
            let userId = null;
            let generalCount = 0;
            let vipCount = 0;
            let timestamp = null;
            
            // 1. Из Telegram WebApp
            if (window.Telegram?.WebApp?.initDataUnsafe?.start_param) {
                const startParam = window.Telegram.WebApp.initDataUnsafe.start_param;
                debugLog(`📦 start_param из Telegram: "${startParam}"`);
                
                if (startParam.startsWith('gallery_')) {
                    postId = startParam.replace('gallery_', '');
                } else {
                    postId = startParam;
                }
                
                if (window.Telegram.WebApp.initDataUnsafe?.user?.id) {
                    userId = window.Telegram.WebApp.initDataUnsafe.user.id;
                }
            }
            
            // 2. Из URL параметров
            const params = new URLSearchParams(window.location.search);
            
            const urlPost = params.get('post') || params.get('startapp');
            if (urlPost) {
                debugLog(`📦 post из URL: "${urlPost}"`);
                postId = urlPost;
            }
            
            const urlVip = params.get('vip');
            if (urlVip) {
                vip = urlVip === 'true';
                debugLog(`📦 vip из URL: ${vip}`);
            }
            
            const urlUser = params.get('user');
            if (urlUser) {
                userId = parseInt(urlUser);
                debugLog(`📦 user из URL: ${userId}`);
            }
            
            const urlGeneral = params.get('general');
            if (urlGeneral) {
                generalCount = parseInt(urlGeneral) || 0;
                debugLog(`📦 general из URL: ${generalCount}`);
            }
            
            const urlVipCount = params.get('vip_count');
            if (urlVipCount) {
                vipCount = parseInt(urlVipCount) || 0;
                debugLog(`📦 vip_count из URL: ${vipCount}`);
            }
            
            timestamp = params.get('t');
            
            // 3. Принудительный VIP для админа
            if (userId === 337383733) {
                debugLog(`👑 Принудительный VIP для админа ${userId}`);
                vip = true;
            }
            
            debugLog(`📦 Итоговые параметры:
                post: ${postId}
                vip: ${vip}
                user: ${userId}
                general: ${generalCount}
                vip_count: ${vipCount}
                t: ${timestamp}
            `);
            
            return {
                post: postId,
                vip: vip,
                user: userId,
                general: generalCount,
                vip_count: vipCount,
                timestamp: timestamp
            };
        }

        // ==================== GITHUB ФУНКЦИИ ====================
        async function loadFilesFromFolder(postId, folder) {
            const url = `${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}/${folder}`;
            debugLog(`📂 Запрос к GitHub: ${folder}`);
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);
                
                const response = await fetch(url, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' },
                    signal: controller.signal
                });
                
                clearTimeout(timeoutId);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        debugLog(`📁 Папка ${folder} не найдена`);
                    } else {
                        debugLog(`❌ GitHub ответил кодом ${response.status}`, 'error');
                    }
                    return [];
                }
                
                const data = await response.json();
                
                const files = data
                    .filter(item => {
                        const ext = item.name.toLowerCase().slice(item.name.lastIndexOf('.'));
                        return CONFIG.SUPPORTED_FORMATS.includes(ext);
                    })
                    .map(item => ({
                        name: item.name,
                        url: `${CONFIG.GITHUB_RAW}/${CONFIG.REPO}/${CONFIG.BRANCH}/posts/${postId}/${folder}/${item.name}`,
                        type: folder,
                        isBlurred: item.name.startsWith('blur_')
                    }));
                
                debugLog(`📸 Найдено в ${folder}: ${files.length} фото`);
                return files;
                
            } catch (e) {
                if (e.name === 'AbortError') {
                    debugLog(`⏱️ Таймаут при загрузке ${folder}`, 'error');
                } else {
                    debugLog(`❌ Ошибка загрузки ${folder}: ${e.message}`, 'error');
                }
                return [];
            }
        }

        // ==================== ЗАГРУЗКА ГАЛЕРЕИ ====================
        async function loadGallery() {
            clearDebug();
            debugLog('🚀 ЗАГРУЗКА ГАЛЕРЕИ (СБОР ДАННЫХ)...');
            
            const params = getUrlParams();
            
            if (!params.post) {
                showError('Не указан ID поста');
                return;
            }
            
            state.postId = params.post.replace(/[^a-zA-Z0-9_\-]/g, '');
            state.isVip = params.vip;
            state.userId = params.user;
            state.generalCount = params.general;
            state.vipCount = params.vip_count;
            
            debugLog(`📁 Пост: ${state.postId}`);
            debugLog(`👑 VIP статус: ${state.isVip}`);
            debugLog(`👤 User ID: ${state.userId}`);
            
            updateLoadingProgress(20, 'Проверка доступа...');
            
            updateLoadingProgress(40, 'Загрузка изображений...');
            
            const [generalFiles, vipFiles] = await Promise.all([
                loadFilesFromFolder(state.postId, 'general'),
                loadFilesFromFolder(state.postId, 'vip')
            ]);
            
            let files = [];
            
            files.push(...generalFiles.map(f => ({...f, type: 'general'})));
            
            if (state.isVip) {
                const originalVip = vipFiles.filter(f => !f.isBlurred);
                files.push(...originalVip.map(f => ({...f, type: 'vip'})));
                debugLog(`👑 Добавлено ${originalVip.length} оригинальных VIP фото`);
            } else {
                const blurredVip = vipFiles.filter(f => f.isBlurred);
                if (blurredVip.length > 0) {
                    files.push(...blurredVip.map(f => ({...f, type: 'vip-blurred'})));
                    debugLog(`🔒 Добавлено ${blurredVip.length} размытых VIP фото`);
                } else {
                    vipFiles.filter(f => !f.isBlurred).forEach(file => {
                        files.push({
                            ...file,
                            url: file.url.replace('/vip/', '/vip/blur_'),
                            type: 'vip-blurred',
                            isBlurred: true
                        });
                    });
                    debugLog(`🔒 Создано ссылок на размытые версии: ${vipFiles.length}`);
                }
            }
            
            if (files.length === 0) {
                showError('В этом посте нет изображений');
                return;
            }
            
            debugLog(`✅ Всего загружено: ${files.length} фото`);
            
            files.sort((a, b) => a.name.localeCompare(b.name));
            state.files = files;
            
            updateLoadingProgress(90, `Загружено ${files.length} фото...`);
            
            if (state.isVip) {
                document.getElementById('vip-badge').style.display = 'block';
                document.getElementById('save-button').classList.remove('vip-only');
            } else {
                document.getElementById('save-button').classList.add('vip-only');
            }

            // Отправляем событие открытия галереи
            sendUserData('gallery_open', {
                general_count: generalFiles.length,
                vip_count: vipFiles.length,
                total_files: files.length
            });

            setTimeout(() => {
                updateLoadingProgress(100, 'Готово!');
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('gallery-screen').style.display = 'flex';
                        showImage(0);
                        
                        setTimeout(() => {
                            document.getElementById('swipe-hint').classList.add('fade-out');
                        }, 3000);
                    }, 300);
                }, 200);
            }, 300);
        }

        // ==================== НАВИГАЦИЯ ====================
        function showImage(index) {
            if (!state.files.length) return;
            
            if (index < 0) index = state.files.length - 1;
            if (index >= state.files.length) index = 0;
            
            state.currentIndex = index;
            
            const file = state.files[index];
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            const counter = document.getElementById('image-counter');
            
            img.classList.remove('loaded');
            loader.classList.add('active');
            counter.textContent = `${index + 1} / ${state.files.length}`;
            
            if (file.type === 'vip') {
                document.getElementById('vip-badge').style.display = 'block';
            } else {
                document.getElementById('vip-badge').style.display = 'none';
            }
            
            debugLog(`🖼 Показываем ${index + 1}/${state.files.length}: ${file.name}`);
            img.src = file.url;
            
            // Отправляем просмотр (только если фото ещё не было просмотрено)
            if (!state.viewedImages.has(file.url)) {
                state.viewedImages.add(file.url);
                sendUserData('view_image', {
                    file_name: file.name,
                    file_type: file.type,
                    index: index,
                    is_blurred: file.isBlurred || false
                });
            }
            
            const nextIndex = (index + 1) % state.files.length;
            const nextFile = state.files[nextIndex];
            if (nextFile && !state.preloadedImages.has(nextFile.url)) {
                const preloadImg = new Image();
                preloadImg.src = nextFile.url;
                state.preloadedImages.add(nextFile.url);
            }
        }

        function nextImage() {
            showImage(state.currentIndex + 1);
            sendUserData('navigate_next', { 
                from_index: state.currentIndex - 1, 
                to_index: state.currentIndex 
            });
        }

        function prevImage() {
            showImage(state.currentIndex - 1);
            sendUserData('navigate_prev', { 
                from_index: state.currentIndex + 1, 
                to_index: state.currentIndex 
            });
        }

        function closeGallery() {
            debugLog('🚪 Закрытие галереи');
            sendUserData('gallery_close', { 
                last_index: state.currentIndex,
                total_viewed: state.viewedImages.size,
                time_spent: Date.now() - (window.startTime || Date.now())
            });
            if (tg) tg.close();
            else window.close();
        }

        // ==================== УВЕДОМЛЕНИЯ ====================
        let notificationTimeout = null;

        function showNotification(text, duration = 2000, icon = '🔒') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notification-text');
            const notificationIcon = document.querySelector('.notification-icon');
            
            if (notificationTimeout) clearTimeout(notificationTimeout);
            
            notification.classList.remove('hide');
            notificationText.textContent = text;
            if (notificationIcon) notificationIcon.textContent = icon;
            notification.classList.add('show');
            
            notificationTimeout = setTimeout(() => {
                notification.classList.remove('show');
                notification.classList.add('hide');
                notificationTimeout = null;
            }, duration);
        }

        // ==================== СОХРАНЕНИЕ ====================
        async function handleSave() {
            debugLog(`💾 Попытка сохранения (VIP статус: ${state.isVip})`);
            
            if (!state.isVip) {
                showNotification('🍓 Подпишись на канал чтобы сохранять фото', 2000, '🍓');
                sendUserData('save_attempt', {success: false, reason: 'not_vip'});
                return;
            }
            
            const currentFile = state.files[state.currentIndex];
            
            if (currentFile.isBlurred || currentFile.type === 'vip-blurred') {
                showNotification('❌ Нельзя сохранить размытое фото', 1500, '❌');
                sendUserData('save_attempt', {success: false, reason: 'blurred'});
                return;
            }
            
            try {
                const response = await fetch(currentFile.url);
                const blob = await response.blob();
                
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = currentFile.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                setTimeout(() => URL.revokeObjectURL(link.href), 100);
                
                showNotification('✅ Фото сохраняется...', 1000, '✅');
                debugLog(`✅ Сохранение: ${currentFile.name}`);
                
                sendUserData('save_success', {
                    file_name: currentFile.name,
                    file_type: currentFile.type,
                    file_size: blob.size,
                    index: state.currentIndex
                });
                
            } catch (e) {
                debugLog(`❌ Ошибка сохранения: ${e.message}`, 'error');
                showNotification('❌ Ошибка при сохранении', 1500, '❌');
                sendUserData('save_error', {error: e.message});
            }
        }

        // ==================== ОБРАБОТЧИКИ ИЗОБРАЖЕНИЙ ====================
        function onImageLoad() {
            document.getElementById('gallery-image').classList.add('loaded');
            document.getElementById('image-loader').classList.remove('active');
            state.retryCount = 0;
        }

        function onImageError() {
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            
            loader.classList.remove('active');
            debugLog(`❌ Ошибка загрузки: ${img.src}`, 'error');
            
            if (state.retryCount < CONFIG.MAX_RETRIES) {
                state.retryCount++;
                debugLog(`🔄 Повторная попытка ${state.retryCount}/${CONFIG.MAX_RETRIES}...`);
                setTimeout(() => {
                    img.src = img.src.split('?')[0] + '?retry=' + Date.now();
                }, 1000 * state.retryCount);
            } else {
                img.classList.add('loaded');
                img.alt = 'Ошибка загрузки';
                showNotification('❌ Не удалось загрузить фото', 2000, '❌');
            }
        }

        // ==================== ОБРАБОТЧИКИ КАСАНИЙ ====================
        function handleTouchStart(e) {
            state.touchStartX = e.touches[0].clientX;
        }

        function handleTouchEnd(e) {
            if (!state.touchStartX) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diffX = touchEndX - state.touchStartX;
            
            if (Math.abs(diffX) > 50) {
                if (diffX > 0) prevImage();
                else nextImage();
            }
            
            state.touchStartX = 0;
        }

        // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
        function updateLoadingProgress(percent, text) {
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('loading-text').textContent = text;
        }

        function showError(message) {
            debugLog(`❌ ОШИБКА: ${message}`, 'error');
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('gallery-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-message').textContent = message;
        }

        // ==================== ИНИЦИАЛИЗАЦИЯ ====================
        async function init() {
            debugLog('🚀 ИНИЦИАЛИЗАЦИЯ ГАЛЕРЕИ (СБОР ДАННЫХ)');
            
            window.startTime = Date.now();
            
            initTelegram();
            await loadGallery();
            
            document.addEventListener('touchstart', handleTouchStart, { passive: true });
            document.addEventListener('touchend', handleTouchEnd);
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') prevImage();
                else if (e.key === 'ArrowRight') nextImage();
                else if (e.key === 'Escape') closeGallery();
            });
        }

        window.addEventListener('load', init);
        
        window.nextImage = nextImage;
        window.prevImage = prevImage;
        window.closeGallery = closeGallery;
        window.handleSave = handleSave;
        window.onImageLoad = onImageLoad;
        window.onImageError = onImageError;
    </script>
</body>
</html>
