<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; color: #fff; }
        .counter { position: absolute; top: 20px; width: 100%; text-align: center; font-size: 16px; z-index: 10; text-shadow: 0 2px 4px rgba(0,0,0,0.8); font-weight: bold; }
        .viewer { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; touch-action: none; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; transition: opacity 0.3s ease; user-select: none; pointer-events: none; }
        .controls { position: absolute; bottom: 30px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 12px; z-index: 20; }
        .btn-save { background: rgba(255, 255, 255, 0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 12px 40px; border-radius: 50px; font-size: 14px; backdrop-filter: blur(15px); cursor: pointer; font-weight: 600; -webkit-tap-highlight-color: transparent; }
        #lock-msg { color: #ff453a; font-size: 13px; text-align: center; display: none; background: rgba(0,0,0,0.7); padding: 8px 20px; border-radius: 12px; }
        .debug-info { position: absolute; top: 50px; width: 100%; text-align: center; font-size: 10px; color: rgba(255,255,255,0.3); pointer-events: none; }
    </style>
</head>
<body>

    <div class="counter" id="counter">Синхронизация...</div>
    <div class="debug-info" id="debug">Поиск данных...</div>
    
    <div class="viewer" id="main-zone">
        <img id="main-photo" src="" style="opacity: 0;">
    </div>

    <div class="controls">
        <div id="lock-msg">⚠️ Оригинал доступен только VIP</div>
        <button class="btn-save" id="save-btn" onclick="savePhoto()">📥 Сохранить оригинал</button>
    </div>

<script>
    // --- ТВОИ НАСТРОЙКИ ---
    const REPO_OWNER = "Sweatyeyes";
    const REPO_NAME = "Bot-Posting";
    const VIP_USERS = [337383733]; // Твой ID уже здесь

    const tg = window.Telegram.WebApp;
    tg.expand();
    tg.ready();

    const user = tg.initDataUnsafe?.user;
    const userId = user ? user.id : null;
    const isVip = VIP_USERS.includes(userId);

    // УНИВЕРСАЛЬНЫЙ МЕТОД ПОИСКА ID ПОСТА
    function getPostId() {
        const urlParams = new URLSearchParams(window.location.search);
        const hash = window.location.hash.substring(1);
        const hashParams = new URLSearchParams(hash);
        
        // 1. Из официального поля start_param
        let id = tg.initDataUnsafe?.start_param;
        
        // 2. Из хэша (часто на десктопе/маке)
        if (!id) id = hashParams.get('tgWebAppStartParam') || hashParams.get('startapp');
        
        // 3. Из параметров URL
        if (!id) id = urlParams.get('post') || urlParams.get('tgWebAppStartParam') || urlParams.get('startapp');
        
        // 4. Если всё еще пусто, проверяем сам хэш напрямую
        if (!id && hash && hash.length > 5 && !hash.includes('=')) id = hash;

        return id ? id.replace(/[^0-9\-_.]/g, '') : null;
    }

    const postFolder = getPostId();
    let photos = [];
    let cur = 0;
    let startX = 0;

    const img = document.getElementById('main-photo');
    const cnt = document.getElementById('counter');
    const debug = document.getElementById('debug');
    const zone = document.getElementById('main-zone');
    const saveBtn = document.getElementById('save-btn');
    const lockMsg = document.getElementById('lock-msg');

    // Дебаг на экран
    debug.innerText = `Folder: ${postFolder || 'NOT_FOUND'} | User: ${userId || 'GUEST'} | VIP: ${isVip}`;

    async function fetchFiles() {
        if (!postFolder || postFolder.length < 5) {
            cnt.innerText = "ID поста не найден";
            return;
        }

        cnt.innerText = "Синхронизация с GitHub...";

        try {
            const folders = ["general", "vip"];
            for (const folder of folders) {
                const response = await fetch(`https://api.github.com{REPO_OWNER}/${REPO_NAME}/contents/posts/${postFolder}/${folder}`);
                if (response.ok) {
                    const data = await response.json();
                    data.forEach(file => {
                        const name = file.name.toLowerCase();
                        if ((name.endsWith('.jpg') || name.endsWith('.png') || name.endsWith('.jpeg')) && !name.startsWith('blur_')) {
                            photos.push(`${folder}/${file.name}`);
                        }
                    });
                }
            }
            
            if (photos.length > 0) {
                updateGallery();
            } else {
                cnt.innerText = "Фото не найдены";
                debug.innerText += " | Проверь папку posts/" + postFolder;
            }
        } catch (e) {
            cnt.innerText = "Ошибка API";
            debug.innerText = `Error: ${e.message}`;
        }
    }

    function getPhotoUrl(filePath) {
        const baseUrl = `https://raw.githubusercontent.com{REPO_OWNER}/${REPO_NAME}/main/posts/${postFolder}/`;
        if (!isVip && filePath.startsWith('vip/')) {
            const fileName = filePath.split('/').pop();
            return baseUrl + "vip/blur_" + fileName;
        }
        return baseUrl + filePath;
    }

    function updateGallery() {
        img.style.opacity = 0;
        const currentFile = photos[cur];
        img.src = getPhotoUrl(currentFile);
        cnt.innerText = `${cur + 1} / ${photos.length}`;
        
        const isVipContent = currentFile.startsWith('vip/');
        if (!isVip && isVipContent) {
            saveBtn.style.display = 'none';
            lockMsg.style.display = 'block';
        } else {
            saveBtn.style.display = 'block';
            lockMsg.style.display = 'none';
        }
        
        img.onload = () => { img.style.opacity = 1; };
    }

    function change(dir) {
        if (photos.length <= 1) return;
        cur = (cur + dir + photos.length) % photos.length;
        updateGallery();
    }

    zone.addEventListener('touchstart', e => { startX = e.touches.clientX; });
    zone.addEventListener('touchend', e => {
        const endX = e.changedTouches.clientX;
        const diff = endX - startX;
        if (Math.abs(diff) > 40) change(diff < 0 ? 1 : -1);
        else {
            const sw = window.innerWidth;
            if (endX < sw / 3) change(-1);
            else if (endX > sw * 2 / 3) change(1);
        }
    });

    function savePhoto() {
        if (img.src && !img.src.includes('blur_')) {
            const link = document.createElement('a');
            link.href = img.src;
            link.target = '_blank';
            link.click();
        }
    }

    fetchFiles();
</script>
</body>
</html>
