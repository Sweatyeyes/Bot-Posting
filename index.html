<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gallery</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; }
        
        #loading { 
            position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; 
        }
        .spinner { 
            width: 40px; height: 40px; border: 3px solid #333; border-top-color: #2ea6ff; border-radius: 50%; animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        #gallery { display: none; height: 100vh; position: relative; }
        
        #image-container {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }
        
        #image { max-width: 100%; max-height: 100%; object-fit: contain; opacity: 0; transition: opacity 0.2s; }
        #image.loaded { opacity: 1; }
        
        #nav-left, #nav-right { 
            position: absolute; top: 0; bottom: 80px; width: 30%; cursor: pointer; background: transparent;
        }
        #nav-left { left: 0; }
        #nav-right { right: 0; }
        
        #bottom-bar { 
            position: absolute; bottom: 0; left: 0; right: 0; height: 80px; 
            background: linear-gradient(to top, #000, transparent); 
            display: flex; align-items: center; justify-content: space-around; 
            padding: 0 10px;
        }
        
        .bottom-btn {
            background: transparent; border: none; color: white; font-size: 32px; cursor: pointer;
            width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;
            text-shadow: 0 2px 10px rgba(255,255,255,0.3);
        }
        
        #counter { color: white; font-size: 16px; min-width: 70px; text-align: center; }
        #debug-panel {
            position: absolute; bottom: 90px; left: 10px; right: 10px;
            background: rgba(0,0,0,0.85); color: #0f0; font-size: 11px; padding: 10px;
            border-radius: 5px; z-index: 2000; max-height: 200px; overflow-y: auto;
            border: 1px solid #0f0; font-family: monospace;
        }
        .debug-entry { border-bottom: 1px solid #333; padding: 3px 0; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div></div>
    
    <div id="gallery">
        <div id="debug-panel"></div>
        <div id="nav-left" onclick="prev()"></div>
        <div id="nav-right" onclick="next()"></div>
        <div id="image-container"><img id="image" src="" onload="this.classList.add('loaded')" onerror="onImageError()"></div>
        <div id="bottom-bar">
            <button class="bottom-btn" id="coin-btn" onclick="handleCoin()">🪙</button>
            <div id="counter">1/1</div>
        </div>
    </div>

    <script>
        const CONFIG = {
            REPO: "Sweatyeyes/Bot-Posting",
            BRANCH: "main",
            GITHUB_API: "https://api.github.com/repos"
        };
        const BOT_USERNAME = 'k0tbezzabot';
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }
        
        const debugPanel = document.getElementById('debug-panel');
        function debugLog(msg) {
            const entry = document.createElement('div');
            entry.className = 'debug-entry';
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugPanel.appendChild(entry);
            debugPanel.scrollTop = debugPanel.scrollHeight;
            console.log(msg);
        }
        
        const urlParams = new URLSearchParams(window.location.search);
        let postId = urlParams.get('post') || tg?.initDataUnsafe?.start_param;
        let userId = parseInt(urlParams.get('user')) || tg?.initDataUnsafe?.user?.id;
        
        debugLog(`📁 Пост: ${postId}, User: ${userId}`);
        
        let state = {
            files: [],
            index: 0,
            postId: postId,
            userId: userId
        };
        
        if (!postId) {
            debugLog('❌ Нет ID поста');
            document.getElementById('loading').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            document.getElementById('image-container').innerHTML = '<div style="color:red;">Нет ID поста</div>';
        } else {
            loadGallery();
        }
        
        async function loadFolder(folder) {
            const url = `${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${state.postId}/${folder}`;
            debugLog(`📁 ${folder}...`);
            try {
                const res = await fetch(url, { headers: { 'Accept': 'application/vnd.github.v3+json' } });
                if (!res.ok) return [];
                const data = await res.json();
                const images = data.filter(f => f.name.match(/\.(jpg|jpeg|png)$/i));
                debugLog(`✅ ${folder}: ${images.length} фото`);
                return images.map(f => ({ name: f.name, url: f.download_url, type: folder }));
            } catch(e) {
                debugLog(`❌ ${folder}: ${e.message}`);
                return [];
            }
        }
        
        async function loadGallery() {
            debugLog('🔄 Загрузка галереи...');
            const [general, banana, strawberry] = await Promise.all([
                loadFolder('general'), loadFolder('banana'), loadFolder('strawberry')
            ]);
            
            let files = [];
            files.push(...general);
            files.push(...banana);
            files.push(...strawberry);
            
            if (files.length === 0) {
                debugLog('❌ Нет фото');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('gallery').style.display = 'block';
                document.getElementById('image-container').innerHTML = '<div style="color:red;">Нет фото</div>';
                return;
            }
            
            state.files = files;
            debugLog(`✅ ВСЕГО: ${files.length} фото`);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            showImage(0);
        }
        
        function showImage(i) {
            if (!state.files.length) return;
            state.index = (i + state.files.length) % state.files.length;
            const img = document.getElementById('image');
            img.classList.remove('loaded');
            img.src = state.files[state.index].url + '?t=' + Date.now();
            document.getElementById('counter').innerText = `${state.index+1}/${state.files.length}`;
            debugLog(`🖼 ${state.index+1}/${state.files.length}: ${state.files[state.index].name}`);
        }
        
        function onImageError() { setTimeout(() => showImage(state.index), 1000); }
        function next() { showImage(state.index + 1); }
        function prev() { showImage(state.index - 1); }
        
        function handleCoin() {
            tg?.openLink(`https://t.me/${BOT_USERNAME}?start=buy_vip_${state.postId}`);
        }
        
        window.next = next; window.prev = prev; window.handleCoin = handleCoin; window.onImageError = onImageError;
    </script>
</body>
</html>
