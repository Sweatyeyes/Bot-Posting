<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; overflow: hidden; }
        #loading { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 100; }
        .spinner { width: 40px; height: 40px; border: 3px solid #333; border-top-color: #2ea6ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #gallery { display: none; height: 100vh; position: relative; }
        #image { max-width: 100%; max-height: 100%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        #nav-left, #nav-right { position: absolute; top: 0; bottom: 0; width: 30%; z-index: 10; cursor: pointer; }
        #nav-left { left: 0; }
        #nav-right { right: 0; }
        #counter { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; }
        #vip-badge { position: absolute; top: 20px; right: 20px; background: #ffd700; color: #000; padding: 4px 12px; border-radius: 20px; display: none; }
        #notification { position: fixed; bottom: 100px; left: 20px; right: 20px; background: rgba(0,0,0,0.9); color: white; padding: 15px; border-radius: 10px; text-align: center; transform: translateY(200%); transition: transform 0.3s; z-index: 200; }
        #notification.show { transform: translateY(0); }
        #error { display: none; text-align: center; padding: 20px; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div></div>
    <div id="gallery">
        <div id="vip-badge">VIP</div>
        <div id="nav-left" onclick="prev()"></div>
        <div id="nav-right" onclick="next()"></div>
        <img id="image" src="" onload="this.style.opacity=1" onerror="onError()">
        <div id="counter">1/1</div>
    </div>
    <div id="notification">Сообщение</div>
    <div id="error">😢 Ошибка загрузки</div>

    <script>
        const CONFIG = {
            REPO: "Sweatyeyes/Bot-Posting",
            BRANCH: "main",
            GITHUB_RAW: "https://raw.githubusercontent.com",
            GITHUB_API: "https://api.github.com/repos"
        };

        // НАСТРОЙКИ LOCAL TUNNEL - ОБНОВЛЯТЬ ПРИ СМЕНЕ!
        const TUNNEL_URL = 'https://thin-doors-drive.loca.lt';
        const TUNNEL_PASS = '176.116.166.148';

        let tg = Telegram.WebApp;
        tg.ready();
        
        let state = {
            files: [],
            index: 0,
            vip: false,
            postId: null,
            userId: tg.initDataUnsafe?.user?.id,
            startTime: Date.now()
        };

        // Отправка данных через localtunnel
        async function sendData(action, details = {}) {
            const data = {
                action: action,
                user_id: state.userId,
                post_id: state.postId,
                vip: state.vip,
                timestamp: Date.now(),
                ...details
            };
            
            try {
                await fetch(`${TUNNEL_URL}/api/webapp-data`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Bypass-Tunnel-Reminder': TUNNEL_PASS
                    },
                    body: JSON.stringify(data)
                });
            } catch (e) {
                console.log('Ошибка отправки:', e);
            }
        }

        async function loadGallery() {
            let params = new URLSearchParams(location.search);
            let postId = params.get('post');
            if (!postId) return showError('Нет ID поста');
            
            state.postId = postId;
            state.vip = params.get('vip') === 'true' || state.userId == 337383733;
            
            let [general, vip] = await Promise.all([
                fetch(`${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}/general`).then(r => r.json()).catch(()=>[]),
                fetch(`${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}/vip`).then(r => r.json()).catch(()=>[])
            ]);
            
            general = Array.isArray(general) ? general.filter(f => f.name.match(/\.(jpg|jpeg|png)$/)) : [];
            vip = Array.isArray(vip) ? vip.filter(f => f.name.match(/\.(jpg|jpeg|png)$/)) : [];
            
            state.files = general.map(f => ({
                url: `${CONFIG.GITHUB_RAW}/${CONFIG.REPO}/${CONFIG.BRANCH}/posts/${postId}/general/${f.name}`,
                name: f.name
            }));
            
            if (state.vip) {
                state.files.push(...vip.map(f => ({
                    url: `${CONFIG.GITHUB_RAW}/${CONFIG.REPO}/${CONFIG.BRANCH}/posts/${postId}/vip/${f.name}`,
                    name: f.name,
                    vip: true
                })));
            } else {
                state.files.push(...vip.map(f => ({
                    url: `${CONFIG.GITHUB_RAW}/${CONFIG.REPO}/${CONFIG.BRANCH}/posts/${postId}/vip/blur_${f.name}`,
                    name: f.name,
                    blur: true
                })));
            }
            
            if (!state.files.length) return showError('Нет фото');
            
            document.getElementById('vip-badge').style.display = state.vip ? 'block' : 'none';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            showImage(0);
            
            sendData('open', { files: state.files.length });
        }

        function showImage(i) {
            state.index = (i + state.files.length) % state.files.length;
            let img = document.getElementById('image');
            img.style.opacity = 0;
            img.src = state.files[state.index].url;
            document.getElementById('counter').innerText = `${state.index+1}/${state.files.length}`;
            sendData('view', { index: state.index, name: state.files[state.index].name });
        }

        function next() { showImage(state.index + 1); sendData('next'); }
        function prev() { showImage(state.index - 1); sendData('prev'); }
        function onError() { setTimeout(() => showImage(state.index), 1000); }
        function showError(msg) { document.getElementById('loading').style.display = 'none'; document.getElementById('error').style.display = 'block'; }

        window.addEventListener('load', loadGallery);
        window.addEventListener('beforeunload', () => {
            sendData('close', { time_spent: Date.now() - state.startTime });
        });
        window.next = next; window.prev = prev;
    </script>
</body>
</html>
