<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>Telegram Gallery</title>
    
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #2ea6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 16px;
            margin-top: 10px;
            text-align: center;
        }

        .loading-progress {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #2ea6ff;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        /* Основной экран галереи */
        #gallery-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }

        /* Верхняя панель */
        #top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 1002;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            pointer-events: none;
        }

        #back-button {
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s ease;
        }

        #back-button:active {
            background: rgba(0, 0, 0, 0.8);
        }

        #post-info {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: auto;
            max-width: 50%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #vip-badge {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #000;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.3);
            pointer-events: auto;
            display: none;
        }

        /* Контейнер для изображения */
        #image-container {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            min-height: 0;
        }

        #gallery-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.2s ease;
            opacity: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        #gallery-image.loaded {
            opacity: 1;
        }

        /* Навигационные зоны */
        .nav-zone {
            position: absolute;
            top: 60px;
            bottom: 80px;
            width: 30%;
            z-index: 1001;
            -webkit-tap-highlight-color: transparent;
            cursor: pointer;
        }

        #nav-left {
            left: 0;
        }

        #nav-right {
            right: 0;
        }

        /* Индикатор навигации */
        .nav-hint {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        #nav-left .nav-hint {
            left: 10px;
        }

        #nav-right .nav-hint {
            right: 10px;
        }

        .nav-zone:active .nav-hint {
            opacity: 0.5;
        }

        /* Индикатор загрузки */
        .image-loader {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .image-loader.active {
            display: block;
        }

        /* Нижняя панель */
        #bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), rgba(0,0,0,0.7));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1002;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Левая группа элементов */
        #bottom-bar > div:first-child {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Ссылка на клубничку */
        #strawberry-link {
            text-decoration: none;
        }

        /* Кнопка с клубничкой */
        #strawberry-button {
            background: linear-gradient(135deg, #ff3b6f, #ff8c5a);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 59, 111, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        #strawberry-button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        #strawberry-button span {
            font-size: 18px;
        }

        /* Счетчик изображений */
        #image-counter {
            color: white;
            font-size: 15px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            white-space: nowrap;
        }

        /* Кнопка сохранить */
        #save-button {
            background: linear-gradient(135deg, #2ea6ff, #1e7ebf);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(46, 166, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        #save-button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        #save-button.vip-only {
            background: linear-gradient(135deg, #666, #444);
            box-shadow: none;
            opacity: 0.7;
        }

        /* Подсказка */
        #swipe-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: opacity 0.5s ease;
            opacity: 1;
            z-index: 1003;
            pointer-events: none;
            white-space: nowrap;
        }

        #swipe-hint.fade-out {
            opacity: 0;
        }

        /* Уведомление */
        #notification {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: white;
            padding: 15px 20px;
            border-radius: 15px;
            font-size: 16px;
            text-align: center;
            z-index: 3000;
            transform: translateY(200%);
            transition: transform 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        #notification.show {
            transform: translateY(0);
        }

        .notification-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .notification-icon {
            font-size: 24px;
        }

        /* Экран ошибки */
        #error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 3000;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .error-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff3b30;
        }

        .error-message {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            max-width: 300px;
            line-height: 1.5;
        }

        .retry-button {
            background: #2ea6ff;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-button:active {
            transform: scale(0.95);
        }

        /* Адаптация для маленьких экранов */
        @media (max-width: 400px) {
            #bottom-bar {
                padding: 0 12px;
            }
            
            #strawberry-button {
                padding: 6px 12px;
                font-size: 13px;
            }
            
            #strawberry-button span {
                font-size: 16px;
            }
            
            #save-button {
                padding: 8px 18px;
                font-size: 14px;
            }
            
            #image-counter {
                padding: 4px 10px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Загрузка галереи...</div>
        <div class="loading-progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
    </div>

    <!-- Основной экран галереи -->
    <div id="gallery-screen">
        <!-- Верхняя панель -->
        <div id="top-bar">
            <div id="back-button" onclick="closeGallery()">←</div>
            <div id="post-info"></div>
            <div id="vip-badge">VIP</div>
        </div>

        <!-- Навигационные зоны -->
        <div id="nav-left" class="nav-zone" onclick="prevImage()">
            <div class="nav-hint">‹</div>
        </div>
        <div id="nav-right" class="nav-zone" onclick="nextImage()">
            <div class="nav-hint">›</div>
        </div>

        <!-- Контейнер изображения -->
        <div id="image-container">
            <div class="image-loader" id="image-loader"></div>
            <img id="gallery-image" src="" alt="Gallery image" onload="onImageLoad()" onerror="onImageError()">
        </div>

        <!-- Нижняя панель -->
        <div id="bottom-bar">
            <div style="display: flex; align-items: center; gap: 10px;">
                <!-- Кнопка Нейроклубничка -->
                <a href="https://t.me" target="_blank" id="strawberry-link">
                    <button id="strawberry-button">
                        <span>🍓</span> Нейроклубничка™
                    </button>
                </a>
                <!-- Счетчик изображений -->
                <div id="image-counter">1 / 1</div>
            </div>
            <!-- Кнопка Сохранить -->
            <button id="save-button" onclick="handleSave()">
                <span>💾</span> Сохранить
            </button>
        </div>

        <!-- Подсказка -->
        <div id="swipe-hint">👆 Тапайте по краям для навигации</div>
    </div>

    <!-- Уведомление -->
    <div id="notification">
        <div class="notification-content">
            <span class="notification-icon">🔒</span>
            <span id="notification-text">Доступно только для подписчиков канала</span>
        </div>
    </div>

    <!-- Экран ошибки -->
    <div id="error-screen">
        <div class="error-icon">😢</div>
        <div class="error-title">Упс!</div>
        <div class="error-message" id="error-message">Что-то пошло не так</div>
        <button class="retry-button" onclick="location.reload()">Попробовать снова</button>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const CONFIG = {
            REPO: "Sweatyeyes/Bot-Posting",
            BRANCH: "main",
            GITHUB_RAW: "https://raw.githubusercontent.com",
            GITHUB_API: "https://api.github.com/repos",
            TIMEOUT: 10000,
            MAX_RETRIES: 3,
            SUPPORTED_FORMATS: ['.jpg', '.jpeg', '.png', '.gif', '.webp']
        };

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        const state = {
            files: [],
            currentIndex: 0,
            isVip: false,
            postId: null,
            userId: null,
            touchStartX: 0,
            preloadedImages: new Set(),
            retryCount: 0
        };

        // --- ИНИЦИАЛИЗАЦИЯ TELEGRAM ---
        let tg = null;
        
        function initTelegram() {
            try {
                if (window.Telegram?.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    
                    // Получаем данные пользователя
                    const user = tg.initDataUnsafe?.user;
                    if (user) {
                        state.userId = user.id;
                        console.log('👤 User ID:', state.userId);
                    }
                    
                    return true;
                }
            } catch (e) {
                console.error('Ошибка Telegram:', e);
            }
            return false;
        }

        // --- ПОЛУЧЕНИЕ ПАРАМЕТРОВ ---
        function getUrlParams() {
            const params = new URLSearchParams(window.location.search);
            let postId = null;
            
            // Получаем из start_param
            if (window.Telegram?.WebApp?.initDataUnsafe?.start_param) {
                postId = window.Telegram.WebApp.initDataUnsafe.start_param;
                console.log('📦 start_param:', postId);
            }
            
            // Или из URL
            if (!postId) {
                postId = params.get('startapp') || params.get('post');
                console.log('📦 URL param:', postId);
            }
            
            // VIP статус из URL
            const urlVip = params.get('vip') === 'true';
            
            return {
                post: postId,
                vip: urlVip,
                user: params.get('user')
            };
        }

        // --- ФУНКЦИИ GITHUB ---
        async function loadFilesFromFolder(postId, folder) {
            const url = `${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}/${folder}`;
            
            try {
                const response = await fetch(url, {
                    headers: { 'Accept': 'application/vnd.github.v3+json' }
                });
                
                if (!response.ok) return [];
                
                const data = await response.json();
                
                return data
                    .filter(item => {
                        const ext = item.name.toLowerCase().slice(item.name.lastIndexOf('.'));
                        return CONFIG.SUPPORTED_FORMATS.includes(ext) && 
                               !item.name.startsWith('blur_');
                    })
                    .map(item => ({
                        name: item.name,
                        url: `${CONFIG.GITHUB_RAW}/${CONFIG.REPO}/${CONFIG.BRANCH}/posts/${postId}/${folder}/${item.name}`,
                        type: folder
                    }));
                
            } catch (e) {
                console.error(`Ошибка загрузки ${folder}:`, e);
                return [];
            }
        }

        // --- ПРОВЕРКА VIP СТАТУСА ---
        async function checkVipStatus(userId) {
            // Если есть прямой параметр VIP из бота, используем его
            const params = getUrlParams();
            if (params.vip) {
                console.log('👑 VIP статус из параметров');
                return true;
            }
            
            // TODO: Здесь можно сделать запрос к вашему бэкенду
            return false;
        }

        // --- ЗАГРУЗКА ГАЛЕРЕИ ---
        async function loadGallery() {
            const params = getUrlParams();
            
            if (!params.post) {
                showError('Не указан ID поста.\n\nСсылка должна содержать ?startapp=НАЗВАНИЕ_ПАПКИ');
                return;
            }
            
            // Очищаем ID от лишних символов
            state.postId = params.post.replace(/[^a-zA-Z0-9_\-]/g, '');
            state.isVip = await checkVipStatus(state.userId);
            
            console.log('📁 Пост:', state.postId);
            console.log('👑 VIP:', state.isVip);
            
            updateLoadingProgress(30, 'Загрузка изображений...');
            
            const [generalFiles, vipFiles] = await Promise.all([
                loadFilesFromFolder(state.postId, 'general'),
                loadFilesFromFolder(state.postId, 'vip')
            ]);
            
            let files = [];
            
            // Добавляем общие фото
            files.push(...generalFiles.map(f => ({...f, type: 'general'})));
            
            // Добавляем VIP фото
            if (state.isVip) {
                files.push(...vipFiles.map(f => ({...f, type: 'vip'})));
                console.log(`👑 Загружено ${vipFiles.length} VIP фото`);
            } else {
                vipFiles.forEach(file => {
                    files.push({
                        ...file,
                        url: file.url.replace('/vip/', '/vip/blur_'),
                        type: 'vip-blurred',
                        isBlurred: true
                    });
                });
                if (vipFiles.length > 0) {
                    console.log(`🔒 Загружено ${vipFiles.length} размытых VIP фото`);
                }
            }
            
            if (files.length === 0) {
                showError('В этом посте нет изображений');
                return;
            }
            
            // Сортируем по имени
            files.sort((a, b) => a.name.localeCompare(b.name));
            
            state.files = files;
            
            updateLoadingProgress(100, `Готово! ${files.length} фото`);
            
            // Обновляем интерфейс
            document.getElementById('post-info').textContent = `📁 ${state.postId}`;
            
            if (state.isVip) {
                document.getElementById('vip-badge').style.display = 'block';
                document.getElementById('save-button').classList.remove('vip-only');
            } else {
                document.getElementById('save-button').classList.add('vip-only');
            }
            
            // Запускаем галерею
            setTimeout(() => {
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('gallery-screen').style.display = 'flex';
                    showImage(0);
                    
                    // Прячем подсказку через 3 секунды
                    setTimeout(() => {
                        document.getElementById('swipe-hint').classList.add('fade-out');
                    }, 3000);
                }, 300);
            }, 500);
        }

        // --- НАВИГАЦИЯ ---
        function showImage(index) {
            if (!state.files.length) return;
            
            if (index < 0) index = state.files.length - 1;
            if (index >= state.files.length) index = 0;
            
            state.currentIndex = index;
            
            const file = state.files[index];
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            const counter = document.getElementById('image-counter');
            
            img.classList.remove('loaded');
            loader.classList.add('active');
            
            counter.textContent = `${index + 1} / ${state.files.length}`;
            
            let typeInfo = '';
            if (file.type === 'vip') {
                typeInfo = ' (VIP)';
                document.getElementById('vip-badge').style.display = 'block';
            } else {
                document.getElementById('vip-badge').style.display = 'none';
            }
            
            document.getElementById('post-info').textContent = `📁 ${state.postId}${typeInfo}`;
            
            img.src = file.url;
            
            // Предзагрузка следующего
            const nextIndex = (index + 1) % state.files.length;
            const nextFile = state.files[nextIndex];
            if (nextFile && !state.preloadedImages.has(nextFile.url)) {
                const preloadImg = new Image();
                preloadImg.src = nextFile.url;
                state.preloadedImages.add(nextFile.url);
            }
        }

        function nextImage() {
            showImage(state.currentIndex + 1);
        }

        function prevImage() {
            showImage(state.currentIndex - 1);
        }

        function closeGallery() {
            if (tg) {
                tg.close();
            } else {
                window.close();
            }
        }

        // --- ОБРАБОТКА СОХРАНЕНИЯ ---
        function handleSave() {
            if (!state.isVip) {
                showNotification('Доступно только для подписчиков канала');
                return;
            }
            
            const currentFile = state.files[state.currentIndex];
            
            if (currentFile.type === 'vip' || currentFile.type === 'general') {
                // Создаем ссылку для скачивания
                const link = document.createElement('a');
                link.href = currentFile.url;
                link.download = currentFile.name;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                
                showNotification('✅ Фото сохраняется...', 'success');
            } else {
                showNotification('❌ Нельзя сохранить размытое фото');
            }
        }

        // --- УВЕДОМЛЕНИЯ ---
        function showNotification(text, type = 'error') {
            const notification = document.getElementById('notification');
            const notificationText = document.getElementById('notification-text');
            
            notificationText.textContent = text;
            notification.classList.add('show');
            
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // --- ОБРАБОТЧИКИ ИЗОБРАЖЕНИЙ ---
        function onImageLoad() {
            document.getElementById('gallery-image').classList.add('loaded');
            document.getElementById('image-loader').classList.remove('active');
            state.retryCount = 0;
        }

        function onImageError() {
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            
            loader.classList.remove('active');
            
            if (state.retryCount < CONFIG.MAX_RETRIES) {
                state.retryCount++;
                setTimeout(() => {
                    img.src = img.src.split('?')[0] + '?retry=' + Date.now();
                }, 1000);
            } else {
                img.classList.add('loaded');
            }
        }

        // --- ОБРАБОТЧИКИ КАСАНИЙ ДЛЯ СВАЙПОВ ---
        function handleTouchStart(e) {
            state.touchStartX = e.touches[0].clientX;
        }

        function handleTouchEnd(e) {
            if (!state.touchStartX) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diffX = touchEndX - state.touchStartX;
            
            if (Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    prevImage();
                } else {
                    nextImage();
                }
            }
            
            state.touchStartX = 0;
        }

        // --- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ---
        function updateLoadingProgress(percent, text) {
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('loading-text').textContent = text;
        }

        function showError(message) {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('gallery-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-message').textContent = message;
        }

        // --- ИНИЦИАЛИЗАЦИЯ ---
        async function init() {
            console.log('🚀 Инициализация галереи...');
            
            initTelegram();
            await loadGallery();
            
            // Добавляем обработчики свайпов
            document.addEventListener('touchstart', handleTouchStart, { passive: true });
            document.addEventListener('touchend', handleTouchEnd);
        }

        // Запуск при загрузке страницы
        window.addEventListener('load', init);
        
        // Экспортируем функции в глобальную область
        window.nextImage = nextImage;
        window.prevImage = prevImage;
        window.closeGallery = closeGallery;
        window.handleSave = handleSave;
        window.onImageLoad = onImageLoad;
        window.onImageError = onImageError;
    </script>
</body>
</html>
