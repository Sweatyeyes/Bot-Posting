<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Правильный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <title>Telegram Gallery</title>
    
    <style>
        /* Сброс стилей */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Основные стили */
        body, html {
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            position: fixed;
            touch-action: pan-y pinch-zoom;
        }

        /* Экран загрузки */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #2ea6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #888;
            font-size: 16px;
            margin-top: 10px;
            text-align: center;
        }

        .loading-progress {
            width: 200px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 20px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #2ea6ff;
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        /* Основной экран галереи */
        #gallery-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            z-index: 1000;
        }

        /* Контейнер для изображения */
        #image-container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            background: #000;
        }

        /* Изображение */
        #gallery-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.2s ease;
            opacity: 0;
            will-change: transform;
        }

        #gallery-image.loaded {
            opacity: 1;
        }

        /* Индикатор загрузки изображения */
        .image-loader {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        .image-loader.active {
            display: block;
        }

        /* Счетчик изображений */
        #image-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 500;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            z-index: 1002;
            pointer-events: none;
            letter-spacing: 0.5px;
        }

        /* VIP бейдж */
        #vip-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #000;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            z-index: 1001;
            border: 1px solid rgba(255, 255, 255, 0.3);
            letter-spacing: 0.5px;
            display: none;
        }

        /* Кнопка назад */
        #back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 1001;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s ease;
        }

        #back-button:active {
            background: rgba(0, 0, 0, 0.8);
        }

        /* Экран ошибки */
        #error-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 3000;
        }

        .error-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .error-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #ff3b30;
        }

        .error-message {
            font-size: 16px;
            color: #888;
            margin-bottom: 30px;
            max-width: 300px;
            line-height: 1.5;
        }

        .retry-button {
            background: #2ea6ff;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(46, 166, 255, 0.3);
        }

        .retry-button:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        /* Информация о посте */
        #post-info {
            position: absolute;
            top: 70px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: rgba(255, 255, 255, 0.8);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1001;
            max-width: calc(100% - 80px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* Подсказка для свайпа */
        #swipe-hint {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            color: rgba(255, 255, 255, 0.7);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: opacity 0.5s ease;
            opacity: 1;
            z-index: 1001;
            pointer-events: none;
        }

        #swipe-hint.fade-out {
            opacity: 0;
        }

        /* Отладочная панель (только для разработки) */
        #debug-panel {
            position: absolute;
            bottom: 120px;
            left: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #0f0;
            padding: 10px;
            border-radius: 10px;
            font-size: 11px;
            font-family: monospace;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1003;
            display: none;
            max-height: 150px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        #debug-toggle {
            position: absolute;
            bottom: 270px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            cursor: pointer;
            z-index: 1004;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <!-- Экран загрузки -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">Загрузка галереи...</div>
        <div class="loading-progress">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div style="margin-top: 20px; font-size: 12px; color: #444;" id="debug-info"></div>
    </div>

    <!-- Основной экран галереи -->
    <div id="gallery-screen">
        <div id="back-button" onclick="closeGallery()">←</div>
        <div id="post-info"></div>
        <div id="vip-badge">VIP</div>
        
        <div id="image-container">
            <div class="image-loader" id="image-loader"></div>
            <img id="gallery-image" src="" alt="Gallery image" onload="onImageLoad()" onerror="onImageError()">
        </div>
        
        <div id="image-counter">1 / 1</div>
        <div id="swipe-hint">👆 Листайте тапая или свайпая</div>
        
        <!-- Отладочные элементы (можно скрыть в продакшене) -->
        <div id="debug-toggle" onclick="toggleDebug()">🐛</div>
        <div id="debug-panel"></div>
    </div>

    <!-- Экран ошибки -->
    <div id="error-screen">
        <div class="error-icon">😢</div>
        <div class="error-title">Упс!</div>
        <div class="error-message" id="error-message">Что-то пошло не так</div>
        <button class="retry-button" onclick="location.reload()">Попробовать снова</button>
    </div>

    <script>
        // --- КОНФИГУРАЦИЯ ---
        const CONFIG = {
            REPO: "Sweatyeyes/Bot-Posting",
            BRANCH: "main",
            GITHUB_RAW: "https://raw.githubusercontent.com",
            GITHUB_API: "https://api.github.com/repos",
            VIP_USERS: [337383733],  // Синхронизировать с ботом
            TIMEOUT: 10000,  // 10 секунд
            MAX_RETRIES: 3,
            SUPPORTED_FORMATS: ['.jpg', '.jpeg', '.png', '.gif', '.webp'],
            DEBUG: true  // Включить отладку
        };

        // --- СОСТОЯНИЕ ПРИЛОЖЕНИЯ ---
        const state = {
            files: [],
            currentIndex: 0,
            isVip: false,
            postId: null,
            userId: null,
            isLoading: true,
            touchStartX: 0,
            touchStartY: 0,
            touchEndX: 0,
            touchEndY: 0,
            preloadedImages: new Set(),
            retryCount: 0,
            debugLog: []
        };

        // --- ОТЛАДКА ---
        function debugLog(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = `[${timestamp}] ${message}`;
            
            console.log(`🔍 ${logEntry}`);
            
            state.debugLog.push(logEntry);
            if (state.debugLog.length > 20) state.debugLog.shift();
            
            const debugInfo = document.getElementById('debug-info');
            if (debugInfo) {
                debugInfo.textContent = message;
            }
            
            const debugPanel = document.getElementById('debug-panel');
            if (debugPanel && CONFIG.DEBUG) {
                debugPanel.innerHTML = state.debugLog.map(msg => `> ${msg}`).join('<br>');
                debugPanel.scrollTop = debugPanel.scrollHeight;
            }
        }

        function toggleDebug() {
            const panel = document.getElementById('debug-panel');
            if (panel) {
                panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
            }
        }

        // --- ИНИЦИАЛИЗАЦИЯ TELEGRAM WEBAPP ---
        let tg = null;
        
        function initTelegram() {
            try {
                if (window.Telegram && window.Telegram.WebApp) {
                    tg = window.Telegram.WebApp;
                    tg.ready();
                    tg.expand();
                    tg.enableClosingConfirmation();
                    
                    // Настраиваем тему Telegram
                    document.body.style.backgroundColor = tg.themeParams.bg_color || '#000';
                    document.body.style.color = tg.themeParams.text_color || '#fff';
                    
                    debugLog('✅ Telegram WebApp инициализирован');
                    
                    // Показываем всю информацию о initDataUnsafe
                    if (CONFIG.DEBUG) {
                        debugLog(`Telegram initDataUnsafe: ${JSON.stringify(tg.initDataUnsafe)}`);
                    }
                    
                    return true;
                } else {
                    debugLog('❌ Telegram WebApp не найден', 'error');
                    return false;
                }
            } catch (e) {
                debugLog(`❌ Ошибка инициализации Telegram: ${e.message}`, 'error');
                return false;
            }
        }

        // --- ПОЛУЧЕНИЕ ПАРАМЕТРОВ ИЗ URL (ИСПРАВЛЕННАЯ ВЕРСИЯ) ---
        function getUrlParams() {
            debugLog('🔍 Получение параметров...');
            
            const params = new URLSearchParams(window.location.search);
            let postId = null;
            let source = 'unknown';
            
            // 1. Сначала проверяем start_param из Telegram (самый надежный)
            if (window.Telegram?.WebApp?.initDataUnsafe?.start_param) {
                postId = window.Telegram.WebApp.initDataUnsafe.start_param;
                source = 'telegram_start_param';
                debugLog(`📦 Получен start_param из Telegram: "${postId}"`);
            }
            
            // 2. Если нет, пробуем из URL параметров
            if (!postId) {
                postId = params.get('startapp');
                if (postId) {
                    source = 'url_startapp';
                    debugLog(`📦 Получен параметр startapp из URL: "${postId}"`);
                }
            }
            
            if (!postId) {
                postId = params.get('post');
                if (postId) {
                    source = 'url_post';
                    debugLog(`📦 Получен параметр post из URL: "${postId}"`);
                }
            }
            
            if (!postId) {
                postId = params.get('id');
                if (postId) {
                    source = 'url_id';
                    debugLog(`📦 Получен параметр id из URL: "${postId}"`);
                }
            }
            
            // 3. Если всё еще нет, пробуем из хеша
            if (!postId && window.location.hash) {
                const hash = window.location.hash.substring(1);
                if (hash) {
                    postId = hash;
                    source = 'hash';
                    debugLog(`📦 Получен ID из хеша: "${hash}"`);
                }
            }
            
            // Очищаем от возможных префиксов
            if (postId && postId.startsWith('gallery_')) {
                postId = postId.replace('gallery_', '');
                debugLog(`🧹 Удален префикс gallery_, осталось: "${postId}"`);
            }
            
            debugLog(`✅ Итоговый ID поста: "${postId || 'НЕ НАЙДЕН'}" (источник: ${source})`);
            
            return {
                post: postId,
                vip: params.get('vip') === 'true',
                user: params.get('user'),
                t: params.get('t'),
                source: source
            };
        }

        // --- ФУНКЦИИ ДЛЯ РАБОТЫ С GITHUB ---
        async function checkPostExists(postId) {
            const url = `${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}`;
            debugLog(`🔍 Проверка поста: ${url}`);
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);
                
                const response = await fetch(url, {
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                clearTimeout(timeoutId);
                
                const exists = response.status === 200;
                debugLog(`📡 GitHub API ответ: ${response.status} - ${exists ? '✅ найден' : '❌ не найден'}`);
                
                return exists;
            } catch (e) {
                if (e.name === 'AbortError') {
                    debugLog('⏱️ Таймаут при проверке поста', 'error');
                } else {
                    debugLog(`❌ Ошибка проверки поста: ${e.message}`, 'error');
                }
                return false;
            }
        }

        async function loadFilesFromFolder(postId, folder) {
            const url = `${CONFIG.GITHUB_API}/${CONFIG.REPO}/contents/posts/${postId}/${folder}`;
            debugLog(`📂 Загрузка из ${folder}: ${url}`);
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);
                
                const response = await fetch(url, {
                    signal: controller.signal,
                    headers: {
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                clearTimeout(timeoutId);
                
                if (response.status === 404) {
                    debugLog(`📁 Папка ${folder} не найдена (404)`);
                    return [];
                }
                
                if (!response.ok) {
                    debugLog(`❌ Ошибка API ${folder}: ${response.status}`, 'error');
                    return [];
                }
                
                const data = await response.json();
                
                if (!Array.isArray(data)) {
                    debugLog(`⚠️ Неожиданный формат данных для ${folder}`, 'warning');
                    return [];
                }
                
                // Фильтруем только изображения
                const images = data.filter(item => {
                    const ext = item.name.toLowerCase().slice(item.name.lastIndexOf('.'));
                    const isImage = CONFIG.SUPPORTED_FORMATS.includes(ext);
                    const isNotBlurred = !item.name.startsWith('blur_');
                    return isImage && isNotBlurred;
                }).map(item => ({
                    name: item.name,
                    path: `${folder}/${item.name}`,
                    url: `${CONFIG.GITHUB_RAW}/${CONFIG.REPO}/${CONFIG.BRANCH}/posts/${postId}/${folder}/${item.name}`,
                    size: item.size
                }));
                
                debugLog(`✅ Загружено ${images.length} изображений из ${folder}`);
                return images;
                
            } catch (e) {
                if (e.name === 'AbortError') {
                    debugLog(`⏱️ Таймаут при загрузке ${folder}`, 'error');
                } else {
                    debugLog(`❌ Ошибка загрузки ${folder}: ${e.message}`, 'error');
                }
                return [];
            }
        }

        function updateLoadingProgress(percent, text) {
            const progressBar = document.getElementById('progress-bar');
            const loadingText = document.getElementById('loading-text');
            
            if (progressBar) progressBar.style.width = percent + '%';
            if (loadingText && text) loadingText.textContent = text;
            
            debugLog(`${percent}% - ${text}`);
        }

        function showError(message) {
            debugLog(`❌ ОШИБКА: ${message}`, 'error');
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('gallery-screen').style.display = 'none';
            document.getElementById('error-screen').style.display = 'flex';
            document.getElementById('error-message').textContent = message;
            
            // Отправляем ошибку в бот
            if (tg) {
                try {
                    tg.sendData(JSON.stringify({
                        action: 'error',
                        message: message,
                        post: state.postId,
                        userId: state.userId
                    }));
                } catch (e) {}
            }
        }

        // --- ЗАГРУЗКА ГАЛЕРЕИ ---
        async function loadGallery(postId, isVip, userId) {
            debugLog(`🚀 Загрузка галереи: postId=${postId}, vip=${isVip}, userId=${userId}`);
            
            updateLoadingProgress(10, 'Проверка поста...');
            
            try {
                // Проверяем существование поста
                const exists = await checkPostExists(postId);
                
                if (!exists) {
                    showError(`Пост "${postId}" не найден на GitHub.\n\nПроверьте название папки в репозитории.`);
                    return;
                }
                
                // Загружаем файлы
                updateLoadingProgress(30, 'Загрузка изображений...');
                
                const [generalFiles, vipFiles] = await Promise.all([
                    loadFilesFromFolder(postId, 'general'),
                    loadFilesFromFolder(postId, 'vip')
                ]);
                
                // Формируем список файлов
                let files = [];
                
                // Добавляем общие фото
                files.push(...generalFiles.map(f => ({
                    ...f,
                    type: 'general'
                })));
                
                // Добавляем VIP фото
                if (isVip) {
                    // Для VIP - оригиналы
                    files.push(...vipFiles.map(f => ({
                        ...f,
                        type: 'vip'
                    })));
                    debugLog(`👑 VIP пользователь: добавлено ${vipFiles.length} оригинальных VIP фото`);
                } else {
                    // Для обычных - размытые версии
                    vipFiles.forEach(file => {
                        const blurredUrl = file.url.replace('/vip/', '/vip/blur_');
                        files.push({
                            ...file,
                            url: blurredUrl,
                            type: 'vip-blurred',
                            isBlurred: true
                        });
                    });
                    if (vipFiles.length > 0) {
                        debugLog(`🔒 Обычный пользователь: добавлено ${vipFiles.length} размытых VIP фото`);
                    }
                }
                
                if (files.length === 0) {
                    showError('В этом посте нет изображений');
                    return;
                }
                
                // Сортируем файлы по имени
                files.sort((a, b) => a.name.localeCompare(b.name));
                
                // Сохраняем в состоянии
                state.files = files;
                state.postId = postId;
                state.isVip = isVip;
                state.userId = userId;
                
                updateLoadingProgress(100, `Готово! ${files.length} фото`);
                
                // Обновляем информацию
                document.getElementById('post-info').textContent = `📁 ${postId} (${files.length} фото)`;
                
                if (isVip) {
                    document.getElementById('vip-badge').style.display = 'block';
                }
                
                // Запускаем галерею
                setTimeout(() => {
                    document.getElementById('loading-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loading-screen').style.display = 'none';
                        document.getElementById('gallery-screen').style.display = 'block';
                        showImage(0);
                        
                        // Отправляем статистику
                        if (tg) {
                            try {
                                tg.sendData(JSON.stringify({
                                    action: 'view',
                                    post: postId,
                                    files: files.length,
                                    vip: isVip,
                                    time: Date.now()
                                }));
                            } catch (e) {}
                        }
                        
                        // Прячем подсказку через 3 секунды
                        setTimeout(() => {
                            document.getElementById('swipe-hint').classList.add('fade-out');
                        }, 3000);
                    }, 300);
                }, 500);
                
            } catch (error) {
                debugLog(`❌ Ошибка загрузки: ${error.message}`, 'error');
                showError(`Ошибка загрузки: ${error.message}`);
            }
        }

        // --- ФУНКЦИИ ГАЛЕРЕИ ---
        function showImage(index) {
            if (!state.files.length) return;
            
            // Нормализуем индекс
            if (index < 0) index = state.files.length - 1;
            if (index >= state.files.length) index = 0;
            
            state.currentIndex = index;
            
            const file = state.files[index];
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            const counter = document.getElementById('image-counter');
            
            // Показываем загрузку
            img.classList.remove('loaded');
            loader.classList.add('active');
            
            // Обновляем счетчик
            counter.textContent = `${index + 1} / ${state.files.length}`;
            
            // Добавляем информацию о типе фото
            let typeInfo = '';
            if (file.type === 'vip') {
                typeInfo = ' (VIP)';
                document.getElementById('vip-badge').style.display = 'block';
            } else if (file.type === 'vip-blurred') {
                typeInfo = ' (заблокировано)';
                document.getElementById('vip-badge').style.display = 'none';
            } else {
                document.getElementById('vip-badge').style.display = 'none';
            }
            
            document.getElementById('post-info').textContent = `📁 ${state.postId}${typeInfo} — ${index + 1}/${state.files.length}`;
            
            debugLog(`🖼 Показ ${index + 1}: ${file.name} (${file.type})`);
            
            // Загружаем изображение
            img.src = file.url;
            
            // Предзагружаем следующее изображение
            const nextIndex = (index + 1) % state.files.length;
            const nextFile = state.files[nextIndex];
            if (!state.preloadedImages.has(nextFile.url)) {
                const preloadImg = new Image();
                preloadImg.src = nextFile.url;
                state.preloadedImages.add(nextFile.url);
                debugLog(`⏳ Предзагрузка ${nextIndex + 1}: ${nextFile.name}`);
            }
        }

        function onImageLoad() {
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            
            img.classList.add('loaded');
            loader.classList.remove('active');
            
            debugLog(`✅ Изображение загружено`);
        }

        function onImageError() {
            const img = document.getElementById('gallery-image');
            const loader = document.getElementById('image-loader');
            
            debugLog(`❌ Ошибка загрузки изображения: ${img.src}`, 'error');
            
            loader.classList.remove('active');
            
            // Пробуем перезагрузить с другим параметром
            if (state.retryCount < CONFIG.MAX_RETRIES) {
                state.retryCount++;
                debugLog(`🔄 Повторная попытка ${state.retryCount}/${CONFIG.MAX_RETRIES}...`);
                setTimeout(() => {
                    img.src = img.src.split('?')[0] + '?retry=' + Date.now();
                }, 1000);
            } else {
                // Показываем заглушку
                img.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23333"/><text x="50" y="50" font-family="Arial" font-size="14" fill="%23fff" text-anchor="middle" dy=".3em">Ошибка</text></svg>';
                img.classList.add('loaded');
            }
        }

        // --- НАВИГАЦИЯ ---
        function nextImage() {
            showImage(state.currentIndex + 1);
        }

        function prevImage() {
            showImage(state.currentIndex - 1);
        }

        function closeGallery() {
            if (tg) {
                tg.close();
            } else {
                showError('Закройте вкладку браузера');
            }
        }

        // --- ОБРАБОТЧИКИ КАСАНИЙ ---
        function handleTouchStart(e) {
            state.touchStartX = e.touches[0].clientX;
            state.touchStartY = e.touches[0].clientY;
        }

        function handleTouchEnd(e) {
            if (!state.touchStartX || !state.touchStartY) return;
            
            state.touchEndX = e.changedTouches[0].clientX;
            state.touchEndY = e.changedTouches[0].clientY;
            
            handleSwipe();
            
            state.touchStartX = 0;
            state.touchStartY = 0;
        }

        function handleSwipe() {
            const diffX = state.touchEndX - state.touchStartX;
            const diffY = state.touchEndY - state.touchStartY;
            
            // Горизонтальный свайп должен быть значительнее вертикального
            if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > 50) {
                if (diffX > 0) {
                    prevImage(); // Свайп вправо - предыдущее
                    debugLog('👆 Свайп вправо');
                } else {
                    nextImage(); // Свайп влево - следующее
                    debugLog('👆 Свайп влево');
                }
            }
        }

        // --- ГЛАВНАЯ ФУНКЦИЯ ИНИЦИАЛИЗАЦИИ ---
        async function init() {
            debugLog('🚀 Инициализация галереи...');
            
            // Инициализируем Telegram
            initTelegram();
            
            // Получаем параметры
            const params = getUrlParams();
            
            if (!params.post) {
                showError('Не указан ID поста.\n\nСсылка должна содержать ?startapp=НАЗВАНИЕ_ПАПКИ\n\nНапример: ?startapp=15-03_22-55');
                debugLog('❌ Нет ID поста в параметрах', 'error');
                return;
            }
            
            // Очищаем ID поста от недопустимых символов
            const cleanPostId = params.post.replace(/[^a-zA-Z0-9_\-]/g, '');
            
            if (cleanPostId !== params.post) {
                debugLog(`🧹 Очищенный ID: "${cleanPostId}" (был "${params.post}")`);
            }
            
            // Определяем VIP статус
            const isVip = params.vip || (params.user && CONFIG.VIP_USERS.includes(parseInt(params.user)));
            
            // Загружаем галерею
            await loadGallery(cleanPostId, isVip, params.user);
        }

        // --- ОБРАБОТЧИКИ СОБЫТИЙ ---
        window.addEventListener('load', init);
        
        window.addEventListener('error', (e) => {
            debugLog(`❌ Глобальная ошибка: ${e.message}`, 'error');
        });

        // Добавляем обработчики касаний
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('image-container');
            if (container) {
                container.addEventListener('touchstart', handleTouchStart);
                container.addEventListener('touchend', handleTouchEnd);
                
                // Обработчик клика для навигации
                container.addEventListener('click', (e) => {
                    if (e.target.closest('#back-button') || 
                        e.target.closest('#vip-badge') ||
                        e.target.closest('#post-info') ||
                        e.target.closest('#debug-toggle')) {
                        return;
                    }
                    
                    const rect = container.getBoundingClientRect();
                    const clickX = e.clientX;
                    
                    if (clickX < rect.width / 2) {
                        prevImage();
                    } else {
                        nextImage();
                    }
                });
            }
        });
    </script>
</body>
</html>
