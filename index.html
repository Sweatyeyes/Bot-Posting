<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #1a1a1a; color: #fff; font-family: monospace; }
        #log { padding: 20px; font-size: 12px; line-height: 1.4; white-space: pre-wrap; word-break: break-all; }
        .error { color: #ff453a; font-weight: bold; }
        .success { color: #32d74b; }
        .viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="log">🚀 Запуск системы логов...</div>
    <div id="viewer" class="viewer"><img id="pic" src=""></div>

<script>
    const log = (msg, cls) => {
        const div = document.getElementById('log');
        div.innerHTML += `<div class="${cls || ''}">${msg}</div>`;
    };

    const tg = window.Telegram.WebApp;
    tg.expand();

    // ПАРАМЕТРЫ
    const REPO = "Sweatyeyes/Bot-Posting";
    const VIP_USERS =; 
    const userId = tg.initDataUnsafe?.user?.id;
    const isVip = VIP_USERS.includes(userId);

    log(`👤 UserID: ${userId || 'Не определен'}`);
    log(`💎 VIP: ${isVip ? 'ДА' : 'НЕТ'}`);

    // ЛОВУШКА 1: ПРОВЕРКА ID ПАПКИ
    const urlParams = new URLSearchParams(window.location.search);
    const startParam = tg.initDataUnsafe?.start_param;
    const postFolder = startParam || urlParams.get('post');

    if (!postFolder) {
        log("❌ ОШИБКА: ID поста (folder) не найден ни в start_param, ни в URL!", "error");
    } else {
        log(`✅ ID поста: ${postFolder}`, "success");
        fetchFromGithub(postFolder);
    }

    async function fetchFromGithub(folder) {
        log(`📂 Ищу папку: posts/${folder}...`);
        
        try {
            // ЛОВУШКА 2: ПРОВЕРКА API
            const folders = ["general", "vip"];
            let foundFiles = [];

            for (const fld of folders) {
                const apiLink = `https://api.github.com{REPO}/contents/posts/${folder}/${fld}`;
                log(`📡 Запрос к API: ${fld}...`);
                
                const res = await fetch(apiLink);
                if (res.ok) {
                    const data = await res.json();
                    log(`✅ Найдено в ${fld}: ${data.length} файлов`);
                    data.forEach(file => {
                        if (!file.name.startsWith('blur_')) foundFiles.push(`${fld}/${file.name}`);
                    });
                } else {
                    log(`⚠️ Папка ${fld} не ответила (код ${res.status})`);
                }
            }

            if (foundFiles.length > 0) {
                log(`🚀 ЗАПУСК ГАЛЕРЕИ... (${foundFiles.length} фото)`, "success");
                setTimeout(() => {
                    document.getElementById('viewer').style.display = 'flex';
                    startGallery(foundFiles, folder);
                }, 2000);
            } else {
                log("❌ ОШИБКА: Ни одного файла не найдено. Проверь пути в GitHub!", "error");
            }

        } catch (e) {
            log(`❌ КРИТИЧЕСКАЯ ОШИБКА: ${e.message}`, "error");
        }
    }

    function startGallery(files, folder) {
        let cur = 0;
        const pic = document.getElementById('pic');
        const show = () => {
            const path = files[cur];
            const baseUrl = `https://raw.githubusercontent.com{REPO}/main/posts/${folder}/`;
            let url = baseUrl + path;
            
            if (!isVip && path.startsWith('vip/')) {
                url = baseUrl + "vip/blur_" + path.split('/').pop();
            }
            pic.src = url;
            log(`📸 Ссылка фото: ${url}`);
        };
        show();
        document.getElementById('viewer').onclick = () => { 
            cur = (cur + 1) % files.length;
            show();
        };
    }
</script>
</body>
</html>
