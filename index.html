<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gallery</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <style>
        /* ... стили как в v11.5 ... */
    </style>
</head>
<body>
    <!-- ... HTML как в v11.5 ... -->
    <script>
        console.log('🚀 v12.0 - RAW URL (без лимитов GitHub)');
        
        const tg = window.Telegram?.WebApp;
        
        // Параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const rawPost = urlParams.get('post') || (tg?.initDataUnsafe?.start_param?.split(':')[0]);
        const rawUser = urlParams.get('user') || (tg?.initDataUnsafe?.start_param?.split(':')[1]) || tg?.initDataUnsafe?.user?.id;
        const rawSubscribed = urlParams.get('subscribed') === 'true';
        const rawPurchased = urlParams.get('purchased') === 'true';
        const rawBananas = parseInt(urlParams.get('bananas')) || 3;
        
        const unlockedParam = urlParams.get('unlocked') || '';
        const urlUnlockedPhotos = unlockedParam ? unlockedParam.split(',') : [];
        
        // 🔥 НОВОЕ: декодируем список файлов
        const filesB64 = urlParams.get('files');
        let filesData = { general: [], banana: [], strawberry: [] };
        
        if (filesB64) {
            try {
                const filesJson = atob(filesB64.replace(/-/g, '+').replace(/_/g, '/'));
                filesData = JSON.parse(filesJson);
                console.log('📁 Файлы из URL:', filesData);
            } catch(e) {
                console.error('Ошибка декодирования files:', e);
            }
        }
        
        let state = {
            files: [], index: 0, postId: rawPost, userId: parseInt(rawUser),
            isSubscribed: rawSubscribed, hasPurchased: rawPurchased,
            bananasLeft: rawBananas, startTime: Date.now(),
            offlineMode: false, loadingAttempts: 0,
            unlockedPhotos: urlUnlockedPhotos,
            filesData: filesData  // ← список файлов от бота
        };
        
        // Отладка
        const debugPanel = document.getElementById('debug-panel');
        function debugLog(msg, type = 'info') {
            const entry = document.createElement('div');
            entry.className = 'debug-entry';
            if (type === 'error') entry.classList.add('debug-error');
            if (type === 'success') entry.classList.add('debug-success');
            if (type === 'warning') entry.classList.add('debug-warning');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            debugPanel.appendChild(entry);
            debugPanel.scrollTop = debugPanel.scrollHeight;
            while(debugPanel.children.length > 50) debugPanel.removeChild(debugPanel.firstChild);
            console.log(msg);
        }
        
        // ==================== ЗАГРУЗКА ФОТО ИЗ ПАРАМЕТРА ====================
        function buildFileList() {
            const baseUrl = `https://raw.githubusercontent.com/Sweatyeyes/Bot-Posting/main/posts/${state.postId}`;
            let files = [];
            
            // Общие фото
            for (const fileName of state.filesData.general || []) {
                files.push({
                    name: fileName,
                    url: `${baseUrl}/general/${fileName}`,
                    type: 'general',
                    isBlurred: false,
                    isBanana: false
                });
            }
            
            // Банановые фото
            for (const fileName of state.filesData.banana || []) {
                if (!fileName.startsWith('banana_banana_')) {
                    const isUnlocked = state.unlockedPhotos.includes(fileName) || state.hasPurchased;
                    files.push({
                        name: fileName,
                        originalName: fileName,
                        url: `${baseUrl}/banana/${fileName}`,
                        originalUrl: `${baseUrl}/banana/${fileName}`,
                        type: 'banana',
                        isBlurred: !isUnlocked,
                        isBanana: true
                    });
                }
            }
            
            // Клубничные фото
            for (const fileName of state.filesData.strawberry || []) {
                if (!fileName.startsWith('strawberry_strawberry_')) {
                    const hasAccess = state.hasPurchased || state.isSubscribed;
                    files.push({
                        name: fileName,
                        originalName: fileName,
                        url: `${baseUrl}/strawberry/${fileName}`,
                        originalUrl: `${baseUrl}/strawberry/${fileName}`,
                        type: 'strawberry',
                        isBlurred: !hasAccess,
                        isBanana: false
                    });
                }
            }
            
            return files;
        }
        
        async function loadGallery() {
            debugLog('🔄 Загрузка галереи...');
            debugLog(`📁 Пост: ${state.postId}`);
            debugLog(`📊 general: ${state.filesData.general?.length || 0}, banana: ${state.filesData.banana?.length || 0}, strawberry: ${state.filesData.strawberry?.length || 0}`);
            
            const files = buildFileList();
            
            if (files.length === 0) {
                showError('В этом посте нет фото');
                return;
            }
            
            state.files = files;
            debugLog(`✅ Загружено ${files.length} фото`);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('gallery').style.display = 'block';
            updateUI();
            showImage(0);
            setupNavigation();
        }
        
        // ... остальные функции (showImage, next, prev, spendBanana и т.д.) как в v11.5
        
        // Запуск
        async function init() {
            if (!window.Telegram?.WebApp) { 
                showError('Откройте в Telegram'); 
                return; 
            }
            if (tg) { 
                tg.ready(); 
                tg.expand(); 
            }
            if (!state.postId) { 
                showError('Не указан ID поста'); 
                return; 
            }
            
            await checkTunnel();
            await checkSubscription();
            await fetchUnlockedPhotos();
            await loadGallery();
        }
        
        init();
    </script>
</body>
</html>
