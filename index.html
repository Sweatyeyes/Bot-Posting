<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: monospace; }
        #log { padding: 15px; font-size: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-all; }
        .error { color: #ff453a; }
        .success { color: #32d74b; }
        #viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100; align-items: center; justify-content: center; }
        img { max-width: 100%; max-height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="log">🚀 Старт...</div>
    <div id="viewer"><img id="pic" src=""></div>

<script>
    const debug = (msg, cls) => {
        const d = document.getElementById('log');
        if (d) d.innerHTML += `<div class="${cls || ''}">${msg}</div>`;
    };

    // Главная функция запуска
    async function init() {
        debug("🔍 Проверка Telegram SDK...");
        
        // Ждем до 3 секунд появления объекта Telegram
        let attempts = 0;
        while (!window.Telegram || !window.Telegram.WebApp) {
            attempts++;
            if (attempts > 30) {
                debug("❌ ОШИБКА: Telegram SDK не загрузился за 3 сек!", "error");
                return;
            }
            await new Promise(r => setTimeout(r, 100));
        }

        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        debug("✅ SDK Telegram найден!", "success");

        // --- НАСТРОЙКИ ---
        const REPO = "Sweatyeyes/Bot-Posting";
        const VIP_USERS = [337383733]; 
        const user = tg.initDataUnsafe?.user;
        const userId = user ? user.id : null;
        const isVip = VIP_USERS.includes(userId);

        debug(`👤 Юзер: ${userId || 'Неизвестен'} | VIP: ${isVip ? 'ДА' : 'НЕТ'}`);

        // --- ПОЛУЧЕНИЕ ID ПОСТА ---
        const urlParams = new URLSearchParams(window.location.search);
        // Пробуем взять из start_param (для кнопок в канале) или из URL (для десктопа)
        const postFolder = tg.initDataUnsafe?.start_param || urlParams.get('post') || urlParams.get('startapp');

        if (!postFolder) {
            debug("❌ ОШИБКА: Папка поста (ID) не найдена!", "error");
            debug("Проверь ссылку в Боте 1: должно быть ?startapp=...");
            return;
        }

        debug(`📂 Цель: posts/${postFolder}`, "success");

        // --- ЗАГРУЗКА ФАЙЛОВ ---
        debug("📡 Связь с GitHub API...");
        let files = [];
        const subfolders = ["general", "vip"];

        for (const fld of subfolders) {
            try {
                const res = await fetch(`https://api.github.com{REPO}/contents/posts/${postFolder}/${fld}`);
                if (res.ok) {
                    const data = await res.json();
                    debug(`📦 ${fld}: ${data.length} файлов`);
                    data.forEach(item => {
                        if (!item.name.startsWith('blur_')) files.push(`${fld}/${item.name}`);
                    });
                } else {
                    debug(`⚠️ ${fld}: код ${res.status}`);
                }
            } catch (e) {
                debug(`❌ Ошибка сети: ${e.message}`, "error");
            }
        }

        if (files.length > 0) {
            debug("🚀 ЗАПУСК ГАЛЕРЕИ...", "success");
            setTimeout(() => {
                document.getElementById('log').style.display = 'none';
                document.getElementById('viewer').style.display = 'flex';
                runGallery(files, postFolder, REPO, isVip);
            }, 1000);
        } else {
            debug("❌ Файлы не найдены!", "error");
        }
    }

    function runGallery(files, folder, repo, isVip) {
        let cur = 0;
        const pic = document.getElementById('pic');
        const update = () => {
            const file = files[cur];
            const baseUrl = `https://raw.githubusercontent.com{repo}/main/posts/${folder}/`;
            let url = baseUrl + file;
            
            if (!isVip && file.startsWith('vip/')) {
                url = baseUrl + "vip/blur_" + file.split('/').pop();
            }
            pic.src = url;
        };
        update();
        document.getElementById('viewer').onclick = () => {
            cur = (cur + 1) % files.length;
            update();
        };
    }

    // Запускаем инициализацию
    init();
</script>
</body>
</html>
